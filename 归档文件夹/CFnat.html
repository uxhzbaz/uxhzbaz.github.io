<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes"><title>CFnat</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>*{box-sizing:border-box;margin:0}body{font-family:Inter,system-ui,-apple-system,sans-serif;margin:0;min-height:100vh;transition:background .2s,color .2s}body.dark{--bg:#0E1117;--sf:#161B22;--se:#1C2128;--br:#2A2F3A;--bl:#3A3F4A;--t1:#e6edf3;--t2:#8b949e;--ac:#2D7DFF;--sc:#238636;--dg:#da3633;--wn:#d29922;--pp:#a371f7;--gn:#3fb950;--sh:0 4px 12px rgba(0,0,0,0.4)}body.light{--bg:#f6f8fa;--sf:#fff;--se:#f0f2f5;--br:#d0d7de;--bl:#d8dee4;--t1:#1F2328;--t2:#59636e;--ac:#0969da;--sc:#1a7f37;--dg:#cf222e;--wn:#9a6700;--pp:#8250df;--gn:#1a7f37;--sh:0 4px 12px rgba(0,0,0,0.08)}body{background:var(--bg);color:var(--t1)}.app{max-width:1600px;margin:0 auto;padding:16px 20px;display:flex;flex-direction:column;gap:18px}.hd{display:flex;align-items:center;justify-content:space-between}.ttl{font-weight:600;font-size:1.6rem;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--ac),var(--pp));-webkit-background-clip:text;background-clip:text;color:transparent}.thm{background:var(--sf);border:1px solid var(--br);color:var(--t1);padding:8px 14px;border-radius:30px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px}.thm:hover{background:var(--se)}.conn{margin-left:12px;font-size:13px;display:flex;align-items:center;gap:4px}.grid{display:grid;grid-template-columns:1fr 1.4fr;gap:18px}@media (max-width:900px){.grid{grid-template-columns:1fr}}.card{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:18px 20px;box-shadow:var(--sh)}.chd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-weight:600;font-size:16px;border-bottom:1px solid var(--br);padding-bottom:12px;cursor:pointer}.chd i{margin-right:8px;color:var(--ac)}.chd .toggle-icon{margin-left:auto;transition:transform .2s}.card.collapsed .fg,.card.collapsed .lgc{display:none}.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}.fw{grid-column:1/-1}.fld label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px}.fld input,.fld textarea{width:100%;background:var(--bg);border:1px solid var(--br);color:var(--t1);padding:9px 12px;border-radius:10px;font-size:14px}.fld input:focus,.fld textarea:focus{border-color:var(--ac);outline:none}.fld textarea{resize:vertical;min-height:70px;font-family:monospace}.fr{display:flex;gap:8px;align-items:center}.fr input{flex:1}.bic{background:var(--se);border:1px solid var(--br);color:var(--t1);padding:8px 12px;border-radius:10px;cursor:pointer;white-space:nowrap}.badge{font-size:12px;background:var(--se);padding:2px 10px;border-radius:20px;color:var(--ac)}.acts{display:flex;gap:12px;margin:20px 0 8px}.btn{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.15s}.btn-p{background:var(--sc);color:#fff}.btn-d{background:var(--dg);color:#fff}.btn-o{background:0 0;border:1px solid var(--br);color:var(--t1)}.btn:disabled{opacity:.5;cursor:not-allowed}.stb{padding:6px 14px;border-radius:40px;font-weight:600;font-size:14px}.st-run{background:rgba(35,134,54,.18);color:var(--gn);border:1px solid rgba(35,134,54,.4)}.st-stop{background:rgba(218,54,51,.15);color:#ff7b72;border:1px solid rgba(218,54,51,.4)}#connIcon { display: inline-flex; align-items: center; margin-left: 8px; font-size: 14px; }#connIcon { display: inline-flex; align-items: center; margin-left: 8px; font-size: 14px; }
.stb i{color:inherit}body.light .st-run{color:#1a7f37}body.light .st-stop{color:#cf222e}.sg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}.si{background:var(--bg);padding:12px;border-radius:14px;border:1px solid var(--br)}.sil{font-size:12px;color:var(--t2)}.siv{font-size:22px;font-weight:600}.ipp{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}@media (max-width:600px){.ipp{grid-template-columns:1fr}}.ipl{background:var(--bg);border-radius:14px;border:1px solid var(--br);overflow:hidden}.iplh{padding:10px 14px;background:var(--se);font-weight:600;font-size:14px;border-bottom:1px solid var(--br);display:flex;justify-content:space-between}.ipt{width:100%;font-size:13px}.ipt th{text-align:left;padding:8px 10px;color:var(--t2);font-weight:500;border-bottom:1px solid var(--br)}.ipt td{padding:8px 10px;border-bottom:1px solid var(--bl)}.sticky{background:rgba(163,113,247,.1);border-left:4px solid var(--pp)}.dg{color:var(--gn)}.dw{color:var(--wn)}.dd{color:var(--dg)}.lgc{margin-top:18px;background:var(--bg);border-radius:14px;border:1px solid var(--br);padding:6px 0}.lgh{padding:8px 16px;display:flex;justify-content:space-between;border-bottom:1px solid var(--br)}.lg{height:200px;overflow-y:auto;padding:8px 12px;font-family:'SF Mono',monospace;font-size:12px}.lge{padding:2px 0;white-space:nowrap}.lgt{color:var(--t2);margin-right:12px}.lgi{color:#58a6ff}.lgw{color:var(--wn)}.lge{color:var(--dg)}.fr2{display:flex;align-items:center;gap:8px}.thg{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.thg input{width:90px;min-width:70px;flex:1}.unit{font-size:13px;color:var(--t2);margin-left:2px}.legend-bar{display:flex;flex-wrap:wrap;justify-content:space-around;align-items:center;gap:12px;margin-top:14px;font-size:13px;color:var(--t2)}.inline-tip{font-size:12px;color:var(--t2);margin-left:8px;white-space:nowrap}.inline-tip i{margin-right:4px}</style></head><body class="dark"><div class="app"><div class="hd"><div class="fr2">
    <span class="ttl"><i class="fas fa-bolt"></i> CFnat</span>
    <span id="connIcon" style="font-size:14px; white-space:nowrap; margin-left: 12px;"></span>
</div><button class="thm" id="thmBtn"><i class="fas fa-moon"></i><span>暗色</span></button></div><div class="grid"><div style="display:flex;flex-direction:column;gap:18px"><div class="card" id="configCard"><div class="chd" id="configToggle"><span><i class="fas fa-sliders-h"></i> 服务配置</span><i class="fas fa-chevron-down toggle-icon"></i></div><div class="fg"><div class="fld fw"><label><i class="fas fa-folder-open"></i> 测速文件 / 手动输入</label><div class="fr"><input id="ipf" placeholder="文件路径或留空 手动IP优先"><button class="bic" id="upBtn"><i class="fas fa-upload"></i> 上传</button></div></div><div class="fld fw"><div style="display:flex;justify-content:space-between"><label><i class="fas fa-list-ul"></i> IP列表 (每行一个)</label><span id="ipc" class="badge">0 个</span></div><textarea id="ipa" placeholder="1.1.1.1&#10;2.2.2.2&#10;..."></textarea></div><div class="fld"><label><i class="fas fa-globe"></i> 测速地址</label><input id="http" placeholder="http://cp.cloudflare.com/cdn-cgi/trace"></div><div class="fld"><label><i class="fas fa-building"></i> 数据中心</label><input id="colo" placeholder="SJC,LAX"></div><div class="fld"><label><i class="fas fa-stopwatch"></i> 延迟</label><input id="dl" type="number" value="300" placeholder="ms"></div><div class="fld"><label><i class="fas fa-box"></i> 丢包率(%)</label><input id="tlr" type="number" min="0" max="100" step="0.1" value="5.0"></div><div class="fld"><label><i class="fas fa-gauge-high"></i> 测速并发</label><input id="thr" type="number" value="8"></div><div class="fld"><label><i class="fas fa-weight-scale"></i> 负载数量</label><input id="ips" type="number" value="10"></div><div class="fld"><label><i class="fas fa-fingerprint"></i> TLS端口</label><input id="tls" type="number" value="443"></div><div class="fld"><label><i class="fas fa-network-wired"></i> HTTP端口</label><input id="hport" type="number" value="80"></div><div class="fld fw">
    <label><i class="fas fa-server"></i> 本地服务器</label>
    <div style="display:flex; align-items:center; gap:8px;">
        <input id="addr" value="127.0.0.1:1234" style="flex:1;">
    </div>
</div><div class="fld" style="grid-column:span 2; display:grid; grid-template-columns:1fr 1fr; gap:12px;"><div><label><i class="fas fa-archive"></i> 最大负载槽</label><input id="mss" type="number" value="5"></div><div><label><i class="fas fa-stopwatch"></i> 延迟阈值</label><div class="thg"><span>绿 ≤</span><input id="gth" type="number" min="0" value="100"><span class="unit">ms</span><span style="margin-left:12px">红 ≥</span><input id="yth" type="number" min="0" value="300"><span class="unit">ms</span></div></div></div><div class="acts" style="grid-column:1/-1;"><button class="btn" id="runBtn"><i class="fas fa-play"></i> 启动</button><button class="btn btn-o" id="cfgBtn"><i class="fas fa-sync-alt"></i> 重启并应用</button></div></div></div><div class="card" id="logCard"><div class="chd" id="logToggle"><span><i class="fas fa-terminal"></i> 运行日志</span><i class="fas fa-chevron-down toggle-icon"></i></div><div class="lgc"><div class="lgh"><span>最新事件</span><button class="bic" id="clrLog" style="padding:4px 12px"><i class="fas fa-trash-alt"></i> 清空</button></div><div class="lg" id="logP"><div class="lge">等待日志...</div></div></div></div></div><div><div class="card"><div class="chd"><span><i class="fas fa-wave-square"></i> 实时状态</span><span id="stb" class="stb st-stop"><i class="fas fa-circle-pause"></i> 已暂停</span></div><div class="sg"><div class="si"><div class="sil">运行时间</div><div class="siv" id="upt">00:00:00</div></div><div class="si"><div class="sil">下次检查</div><div class="siv" id="nxt">0s</div></div><div class="si"><div class="sil">主队列</div><div class="siv" id="pq">0/0</div></div><div class="si"><div class="sil">备选队列</div><div class="siv" id="bq">0/0</div></div><div class="si"><div class="sil">Sticky</div><div class="siv" id="stk">0</div></div><div class="si"><div class="sil">检查间隔</div><div class="siv" id="intv">30s</div></div></div><div class="ipp"><div class="ipl"><div class="iplh"><div style="display:flex;align-items:center;gap:8px"><span><i class="fas fa-scale-balanced" style="color:var(--sc)"></i> 负载均衡</span><button class="bic" id="expPBtn" style="padding:3px 10px;font-size:12px"><i class="fas fa-download"></i> 导出</button></div><span id="pt">0</span></div><div style="max-height:280px;overflow-y:auto"><table class="ipt" id="ptb"><thead><tr><th>IP/数据中心</th><th>延迟</th><th>丢包</th><th>采样</th></tr></thead><tbody id="pb"></tbody></table></div></div><div class="ipl"><div class="iplh"><div style="display:flex;align-items:center;gap:8px"><span><i class="fas fa-layer-group" style="color:var(--ac)"></i> 备选列表</span><button class="bic" id="expBBtn" style="padding:3px 10px;font-size:12px"><i class="fas fa-download"></i> 导出</button></div><span id="bt">0</span></div><div style="max-height:280px;overflow-y:auto"><table class="ipt" id="btb"><thead><tr><th>IP/数据中心</th><th>延迟</th><th>丢包</th><th>采样</th></tr></thead><tbody id="bb"></tbody></table></div></div></div><div class="legend-bar"><span><i class="fas fa-thumbtack" style="color:var(--pp)"></i> Sticky</span><span><i class="fas fa-circle-check" style="color:var(--gn)"></i> ≤<span id="gv">100</span>ms</span><span><i class="fas fa-circle-exclamation" style="color:var(--wn)"></i> ≤<span id="yv">300</span>ms</span><span><i class="fas fa-circle-xmark" style="color:var(--dg)"></i> ><span id="rv">300</span>ms</span></div></div></div></div></div><input type="file" id="hf" accept="text/*" style="display:none"><script>
(function(){
const D={stb:document.getElementById('stb'),upt:document.getElementById('upt'),nxt:document.getElementById('nxt'),pq:document.getElementById('pq'),bq:document.getElementById('bq'),stk:document.getElementById('stk'),intv:document.getElementById('intv'),pt:document.getElementById('pt'),bt:document.getElementById('bt'),pb:document.getElementById('pb'),bb:document.getElementById('bb'),logP:document.getElementById('logP'),ipf:document.getElementById('ipf'),ipa:document.getElementById('ipa'),ipc:document.getElementById('ipc'),http:document.getElementById('http'),colo:document.getElementById('colo'),dl:document.getElementById('dl'),tlr:document.getElementById('tlr'),thr:document.getElementById('thr'),ips:document.getElementById('ips'),tls:document.getElementById('tls'),hport:document.getElementById('hport'),mss:document.getElementById('mss'),addr:document.getElementById('addr'),gth:document.getElementById('gth'),yth:document.getElementById('yth'),runBtn:document.getElementById('runBtn'),cfgBtn:document.getElementById('cfgBtn'),clrLog:document.getElementById('clrLog'),upBtn:document.getElementById('upBtn'),hf:document.getElementById('hf'),gv:document.getElementById('gv'),yv:document.getElementById('yv'),rv:document.getElementById('rv'),thmBtn:document.getElementById('thmBtn'),connIcon:document.getElementById('connIcon'),expPBtn:document.getElementById('expPBtn'),expBBtn:document.getElementById('expBBtn')};
let cur={running:!1},es=null,lt=null,conn=!1;

document.querySelectorAll('.chd').forEach(h=>{h.onclick=()=>{let c=h.closest('.card'),i=h.querySelector('.toggle-icon');c.classList.toggle('collapsed');i.classList.toggle('fa-chevron-down');i.classList.toggle('fa-chevron-right');}});
function setTheme(t){document.body.classList.remove('dark','light');document.body.classList.add(t);D.thmBtn.innerHTML=t==='light'?'<i class="fas fa-sun"></i><span>亮色</span>':'<i class="fas fa-moon"></i><span>暗色</span>';localStorage.setItem('cfnat-theme',t)}
setTheme(localStorage.getItem('cfnat-theme')||'dark');
D.thmBtn.onclick=()=>setTheme(document.body.classList.contains('dark')?'light':'dark');
function setConn(c){conn=c;const i=D.connIcon;i.innerHTML=c?'<i class="fas fa-link" style="color:var(--sc)"></i> 已连接':'<i class="fas fa-triangle-exclamation" style="color:var(--dg)"></i> 离线';i.title=c?'已连接':'离线';}
function fmtUp(s){let h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}
function getTh(){let g=parseInt(D.gth.value)||100,y=parseInt(D.yth.value)||300;if(y<g)y=g;return{g,y};}
function updLeg(){let{g,y}=getTh();D.gv.textContent=g;D.yv.textContent=y;D.rv.textContent=y;if(cur&&cur.primary_ips)renderIPs(cur);}
D.gth.oninput=updLeg;D.yth.oninput=updLeg;updLeg();
function dc(d){if(d<=0)return'';let{g,y}=getTh();if(d<=g)return'dg';if(d<=y)return'dw';return'dd'}
function renderIPs(s){let st=new Set(s.sticky_ips||[]),pi=s.primary_ips||[],bi=s.backup_ips||[];
function r(ips,tb){tb.innerHTML='';if(!ips.length){tb.innerHTML='<tr><td colspan="4" style="text-align:center;padding:16px;color:var(--t2);">暂无数据</td></tr>';return}
ips.forEach(ip=>{let tr=document.createElement('tr');if(st.has(ip.ip))tr.classList.add('sticky');let cls=dc(ip.delay),lp=(ip.loss*100).toFixed(1),co=ip.colo?` [${ip.colo}]`:'';tr.innerHTML=`<td>${ip.ip}${co}</td><td class="${cls}">${ip.delay>0?ip.delay.toFixed(0)+'ms':'-'}</td><td>${lp}%</td><td>${ip.samples}</td>`;tb.appendChild(tr)})}
r(pi,D.pb);r(bi,D.bb)}
function applyStat(s){cur=s;let r=s.running;D.stb.className=`stb ${r?'st-run':'st-stop'}`;D.stb.innerHTML=r?'<i class="fas fa-circle-play"></i> 运行中':'<i class="fas fa-circle-pause"></i> 已暂停';D.runBtn.innerHTML=r?'<i class="fas fa-circle-pause"></i> 暂停':'<i class="fas fa-play"></i> 启动';D.runBtn.className=`btn ${r?'btn-d':'btn-p'}`;D.upt.textContent=fmtUp(s.uptime_secs||0);D.nxt.textContent=(s.next_health_check||0)+'s';D.intv.textContent=(s.health_check_interval||30)+'s';let pc=s.primary_count||0,pt=s.primary_target||0,bc=s.backup_count||0,bt=s.backup_target||0;D.pq.textContent=`${pc}/${pt}`;D.bq.textContent=`${bc}/${bt}`;D.stk.textContent=(s.sticky_ips||[]).length;D.pt.textContent=`目标 ${pt}`;D.bt.textContent=`目标 ${bt}`;renderIPs(s);updCnt()}
function applyCfg(c){if(!c)return;D.ipf.value=c.ip_file||'';D.http.value=c.http||'';D.dl.value=c.delay_limit??300;D.tlr.value=((c.tlr??0.05)*100).toFixed(1);D.ips.value=c.ips??10;D.thr.value=c.threads??8;D.tls.value=c.tls_port??443;D.hport.value=c.http_port??80;D.mss.value=c.max_sticky_slots??5;D.addr.value=c.addr||'127.0.0.1:1234';D.colo.value=Array.isArray(c.colo)?c.colo.join(','):''}
function updCnt(){let n=D.ipa.value.split('\n').filter(l=>l.trim()).length;D.ipc.textContent=`${n} 个`}
D.ipa.oninput=updCnt;
async function fetchCfg(){try{let r=await fetch('/api/config');if(r.ok)applyCfg(await r.json())}catch(e){}}
function startSSE(){if(es)es.close();es=new EventSource('/api/stream');es.onopen=()=>setConn(!0);es.onerror=()=>{if(cur.running)setConn(!1)};es.onmessage=e=>{try{let d=JSON.parse(e.data),wr=cur.running;if(d.status)applyStat(d.status);if(d.config&&!wr&&d.status.running)applyCfg(d.config);setConn(!0)}catch(ex){}}}
async function fetchLogs(){try{let r=await fetch('/api/logs'),logs=await r.json();if(!logs.length){D.logP.innerHTML='<div class="lge">暂无日志</div>';return}D.logP.innerHTML=logs.map(l=>`<div class="lge"><span class="lgt">${l.timestamp}</span><span class="lg${l.level==='INFO'?'i':l.level==='WARN'?'w':'e'}">[${l.level}]</span> ${l.message.replace(/</g,'&lt;')}</div>`).join('');D.logP.scrollTop=D.logP.scrollHeight}catch(e){}}
async function clearLogs(){await fetch('/api/logs/clear',{method:'POST'});fetchLogs()}
async function start(){let ipc=D.ipa.value.split('\n').map(l=>l.trim()).filter(l=>l),colo=D.colo.value.trim(),ca=colo?colo.split(',').map(s=>s.trim()):null,tlrV=parseFloat(D.tlr.value),tlr=isNaN(tlrV)?0.05:Math.min(1,Math.max(0,tlrV/100)),p={ip_file:D.ipf.value||null,ip_content:ipc.length?ipc:null,http:D.http.value||null,delay_limit:parseInt(D.dl.value)||300,tlr:tlr,ips:parseInt(D.ips.value)||10,threads:parseInt(D.thr.value)||8,tls_port:parseInt(D.tls.value)||443,http_port:parseInt(D.hport.value)||80,colo:ca,addr:D.addr.value||null,max_sticky_slots:parseInt(D.mss.value)||5};Object.keys(p).forEach(k=>p[k]==null&&delete p[k]);D.runBtn.disabled=!0;try{let r=await fetch('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}),j=await r.json();alert(j.message||(j.success?'启动成功':'启动失败'));if(j.success){applyStat({running:!0});fetchCfg()}}catch(e){alert('请求失败')}D.runBtn.disabled=!1}
async function stop(){D.runBtn.disabled=!0;try{let r=await fetch('/api/stop',{method:'POST'}),j=await r.json();alert(j.message);if(j.success)applyStat({running:!1})}catch(e){}D.runBtn.disabled=!1}
D.upBtn.onclick=()=>D.hf.click();
D.hf.onchange=async e=>{let f=D.hf.files[0];if(!f)return;let t=await f.text();D.ipa.value=t;updCnt();D.ipf.value=f.name;D.hf.value=''}
function exp(ips,p,t){if(!ips||!ips.length)return alert(t+'列表为空');let s=ips.map(ip=>`${ip.ip}:${p}${ip.colo?'#'+ip.colo:''}`).join('\n');navigator.clipboard.writeText(s).then(()=>alert(`${ips.length}个IP已复制`),()=>alert('复制失败'))}
async function init(){setConn(!1);await fetchCfg();startSSE();fetchLogs();lt=setInterval(fetchLogs,3000);updCnt();}
D.runBtn.onclick=()=>cur.running?stop():start();D.cfgBtn.onclick=async()=>{if(cur.running)await stop();await start()};D.clrLog.onclick=clearLogs;
D.expPBtn.onclick=()=>exp(cur.primary_ips,D.tls.value,'主');D.expBBtn.onclick=()=>exp(cur.backup_ips,D.tls.value,'备选');
window.onbeforeunload=()=>{if(es)es.close();if(lt)clearInterval(lt)};
init();
})();
</script></body></html>
