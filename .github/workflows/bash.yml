name: Build bash 5.3.9 for Android 26

on:
  workflow_dispatch:
    inputs:
      api_level:
        description: 'Android API Level (minSdk)'
        default: '26'
        required: true
      targets:
        description: 'Android ABI，逗号分隔'
        default: 'aarch64-linux-android,armv7a-linux-androideabi,i686-linux-android,x86_64-linux-android'
        required: true

env:
  NDK_VERSION: '26.1.10909125'
  BASH_VERSION: '5.3'
  BASH_FULL_VERSION: '5.3.9'
  NCURSES_VERSION: '6.4'

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
    steps:
      - id: p
        shell: bash
        env:
          TARGETS: ${{ github.event.inputs.targets }}
        run: |
          include='[]'
          IFS=',' read -ra TS <<< "$TARGETS"
          for t in "${TS[@]}"; do
            t="${t# }"; t="${t% }"
            [[ -z "$t" ]] && continue
            include=$(jq --arg t "$t" '. += [{"t":$t}]' <<< "$include")
          done
          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT

  build:
    needs: s
    name: ${{ matrix.t }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    steps:
      - name: 安装构建依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: gettext
          version: 1.0

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: 设置工具链环境变量
        run: |
          API="${{ github.event.inputs.api_level }}"
          ABI="${{ matrix.t }}"
          TOOLCHAIN_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "TC=${ABI}" >> $GITHUB_ENV
          echo "API=${API}" >> $GITHUB_ENV
          echo "INST=${{ github.workspace }}/install" >> $GITHUB_ENV
          echo "${TOOLCHAIN_BIN}" >> $GITHUB_PATH
          echo "CC=${TOOLCHAIN_BIN}/${ABI}${API}-clang" >> $GITHUB_ENV
          echo "CXX=${TOOLCHAIN_BIN}/${ABI}${API}-clang++" >> $GITHUB_ENV
          echo "AR=${TOOLCHAIN_BIN}/llvm-ar" >> $GITHUB_ENV
          echo "RANLIB=${TOOLCHAIN_BIN}/llvm-ranlib" >> $GITHUB_ENV
          echo "STRIP=${TOOLCHAIN_BIN}/llvm-strip" >> $GITHUB_ENV
          echo "LD=${TOOLCHAIN_BIN}/ld.lld" >> $GITHUB_ENV
          echo "CFLAGS=-Os -fPIC" >> $GITHUB_ENV
          echo "PKG_CONFIG=false" >> $GITHUB_ENV

      - name: 下载 bash 源码
        run: |
          curl -fsSL --retry 3 "https://ftp.gnu.org/gnu/bash/bash-${{ env.BASH_VERSION }}.tar.gz" -o bash.tar.gz
          mkdir -p src
          tar -xf bash.tar.gz -C src --strip-components=1

      - name: 打补丁 (bash53-001 ~ 009)
        working-directory: src
        run: |
          for i in 1 2 3 4 5 6 7 8 9; do
            curl -fsSL --retry 3 "https://ftp.gnu.org/gnu/bash/bash-5.3-patches/bash53-00${i}" -o "/tmp/bash53-00${i}.patch"
            patch -p0 < "/tmp/bash53-00${i}.patch"
          done

      - name: 修改 config-top.h
        working-directory: src
        run: |
          sed -i 's|/\* #define SYS_BASHRC "/etc/bash.bashrc" \*/|#define SYS_BASHRC "/etc/bashrc"|' config-top.h
          sed -i 's|/\* #define SYS_BASH_LOGOUT "/etc/bash.bash_logout" \*/|#define SYS_BASH_LOGOUT "/etc/bash_logout"|' config-top.h
          sed -i 's|/\*#define HISTSIZE_DEFAULT "500"\*/|#define HISTSIZE_DEFAULT "10000"|' config-top.h
          sed -i 's|"/usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin:."|"/product/bin:/apex/com.android.runtime/bin:/apex/com.android.art/bin:/apex/com.android.virt/bin:/system_ext/bin:/system/bin:/system/xbin:/odm/bin:/vendor/bin:/vendor/xbin:."|' config-top.h

      - name: 编译 ncurses (静态)
        run: |
          mkdir -p ncurses && cd ncurses
          curl -fsSL --retry 3 "https://ftp.gnu.org/pub/gnu/ncurses/ncurses-${{ env.NCURSES_VERSION }}.tar.gz" -o ncurses.tar.gz
          tar -xf ncurses.tar.gz --strip-components=1
          ./configure --host="${TC}" --build=x86_64-linux-gnu CC_FOR_BUILD=gcc \
            --prefix="${{ github.workspace }}/ncurses/inst" \
            --enable-static --disable-shared --with-shared=no \
            --without-progs --without-tests --without-ada --without-manpages --without-cxx-binding \
            --with-fallbacks="xterm,xterm-256color,linux,vt100,screen,screen-256color,tmux,tmux-256color" \
            CFLAGS="-Os" LDFLAGS=""
          make -j$(nproc)
          make install

      - name: 编译 bash
        working-directory: src
        run: |
          export bash_cv_job_control_missing=present
          export bash_cv_sys_named_pipes=present
          export bash_cv_func_sigsetjmp=present
          export bash_cv_printf_a_format=yes
          NC_INST="${{ github.workspace }}/ncurses/inst"
          ./configure --host="${TC}" --prefix=/usr \
            --disable-dependency-tracking --disable-shared --enable-static --without-bash-malloc \
            CPPFLAGS="-I${NC_INST}/include -I${NC_INST}/include/ncurses" \
            LDFLAGS="-L${NC_INST}/lib" CFLAGS="-Os"
          make -j$(nproc)
          make install DESTDIR="${INST}"

      - name: 收集产物
        run: |
          STRIP_BIN="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          mkdir -p dist
          while IFS= read -r -d '' f; do
            file "$f" | grep -qE 'ELF.*executable' || continue
            fname=$(basename "$f")
            "$STRIP_BIN" "$f" 2>/dev/null || true
            cp "$f" "dist/${fname}"
          done < <(find "${INST}/usr/bin" -maxdepth 1 -type f -print0 2>/dev/null)
          echo "产物列表:"
          find dist -type f | sort

      - name: 打包产物
        run: |
          ABI="${{ matrix.t }}"
          API="${{ github.event.inputs.api_level }}"
          PKG_NAME="bash-${{ env.BASH_FULL_VERSION }}-${ABI}-api${API}"
          tar -cJf "${PKG_NAME}.tar.xz" -C dist .
          sha256sum "${PKG_NAME}.tar.xz" > "${PKG_NAME}.tar.xz.sha256"
          echo "打包完毕: ${PKG_NAME}.tar.xz ($(ls -lh "${PKG_NAME}.tar.xz" | awk '{print $5}'))"

      - name: 上传产物至 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bash-${{ env.BASH_FULL_VERSION }}-${{ matrix.t }}
          path: |
            *.tar.xz
            *.tar.xz.sha256

  release:
    needs: build
    name: 发布至 Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载所有的构建产物
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: "*"
          merge-multiple: true

      - name: 收集校验和并生成 RELEASE.md
        run: |
          echo "### 📦 bash ${{ env.BASH_FULL_VERSION }} for Android" > RELEASE.md
          echo "" >> RELEASE.md
          echo "| 文件名 | SHA256 |" >> RELEASE.md
          echo "| -------- | --------- |" >> RELEASE.md
          for i in release/*.sha256; do
            HASH=$(awk '{print $1}' "$i")
            FILENAME=$(basename "$i" .sha256)
            echo "| \`${FILENAME}\` | \`${HASH}\` |" >> RELEASE.md
          done

      - name: 推送构建产物到 Release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: bash-${{ env.BASH_FULL_VERSION }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "bash ${{ env.BASH_FULL_VERSION }} (Android)" -F RELEASE.md
          fi
          for i in release/*.tar.xz; do
            gh release upload "$TAG_NAME" "$i" "${i}.sha256" --clobber
          done
          gh release edit "$TAG_NAME" -F RELEASE.md
