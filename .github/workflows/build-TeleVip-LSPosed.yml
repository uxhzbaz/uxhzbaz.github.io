name: Build TeleVip LSPosed Module

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 页面手动点击触发编译

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 下载并解压指定的 TeleVip 3.5 源码包
    - name: Download and Extract TeleVip Source Code
      run: |
        echo "正在从 GitHub 获取 TeleVip v3.5 源码..."
        curl -L "https://github.com/mustafa1dev/TeleVip-LSPosed/archive/refs/tags/3.5.tar.gz" -o televip.tar.gz
        tar -xzf televip.tar.gz
        # 解压后目录名为 TeleVip-LSPosed-3.5
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle' # 开启 Gradle 依赖缓存，加速后续编译

    - name: Inject Custom Gradle Wrapper JAR
      run: |
        echo "正在注入指定的官方 Gradle Wrapper JAR..."
        TARGET_DIR="TeleVip-LSPosed-3.5/gradle/wrapper"
        mkdir -p "$TARGET_DIR"
        curl -L "https://github.com/gradle/gradle/raw/refs/heads/master/gradle/wrapper/gradle-wrapper.jar" -o "$TARGET_DIR/gradle-wrapper.jar"
        
        echo "验证 JAR 文件是否下载成功:"
        ls -la "$TARGET_DIR/gradle-wrapper.jar"

    # 4. 授予 gradlew 脚本执行权限
    - name: Grant Execute Permission for Gradlew
      run: chmod +x TeleVip-LSPosed-3.5/gradlew

    # 5. 执行编译 (同时编译 Debug 版和 Release 版)
    - name: Build with Gradle
      run: |
        cd TeleVip-LSPosed-3.5
        ./gradlew assembleDebug assembleRelease --no-daemon --stacktrace

    - name: Upload Built APKs
      uses: actions/upload-artifact@v4
      with:
        name: TeleVip-3.5-APKs
        path: |
          TeleVip-LSPosed-3.5/app/build/outputs/apk/**/*.apk
          TeleVip-LSPosed-3.5/settingsadapter/build/outputs/apk/**/*.apk
