name: B
on:
  workflow_dispatch:
    inputs:
      u:
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      name:
        description: '自定义此次运行名称'
        default: ''
        required: false
      t:
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
      l:
        description: 'cargo build --locked (true/false)'
        default: 'true'
        required: false
      n:
        description: '指定打包的二进制名称，逗号分隔（留空则自动检测所有二进制）'
        default: ''
        required: false
      upx:
        description: '使用 UPX 压缩 (true/false)'
        default: 'true'
        required: false

jobs:
  s:
    runs-on: ubuntu-latest
    outputs:
      s: ${{ steps.p.outputs.s }}
      t: ${{ steps.p.outputs.t }}
    steps:
      - id: p
        shell: bash
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
        run: |
          sources='['; IFS=','; for u in $U; do
            u=${u# }; u=${u% }
            r=${u%%/archive/*}; r=${r##*/}
            tag=${u##*/archive/refs/tags/}
            tag=${tag%.tar.gz}; tag=${tag%.tar.xz}; tag=${tag%.zip}; tag=${tag%.tgz}; tag=${tag%.*}
            b="${r}-${tag}"
            sources+="{\"u\":\"$u\",\"r\":\"$r\",\"b\":\"$b\"},"
          done; sources="${sources%,}]"
          targets='['; for t in $T; do
            t=${t# }; t=${t% }
            case $t in
              *windows*) o=windows-latest ;;
              *apple*) o=macos-latest ;;
              *) o=ubuntu-latest ;;
            esac
            c=''; [[ $t == *riscv* ]] && c='--no-default-features'
            targets+="{\"t\":\"$t\",\"o\":\"$o\",\"c\":\"$c\"},"
          done; targets="${targets%,}]"
          echo "s=$sources" >> $GITHUB_OUTPUT
          echo "t=$targets" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: ${{ matrix.s.b }}-${{ matrix.t.t }}
    runs-on: ${{ matrix.t.o }}
    strategy:
      matrix:
        s: ${{ fromJSON(needs.s.outputs.s) }}
        t: ${{ fromJSON(needs.s.outputs.t) }}
    steps:
      - uses: dtolnay/rust-toolchain@stable

      - if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools upx-ucl xz-utils

      - if: runner.os == 'Windows'
        run: choco install upx

      - if: runner.os == 'macOS'
        run: brew install upx xz

      - name: Download and extract source
        shell: bash
        run: |
          curl -sL ${{ matrix.s.u }} | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml && \
            perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || \
            (grep -q '^\[profile\.release\]' Cargo.toml && \
              perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || \
              printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)

      - uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          args: --release ${{ github.event.inputs.l != 'false' && '--locked' || '' }} ${{ matrix.t.c }}
          target: ${{ matrix.t.t }}

      - name: Set exe extension
        if: runner.os == 'Windows'
        shell: bash
        run: echo "EXE=.exe" >> $GITHUB_ENV

      - name: Package binaries
        shell: bash
        env:
          NAMES_INPUT: ${{ github.event.inputs.n }}
          USE_UPX: ${{ github.event.inputs.upx }}
          TARGET: ${{ matrix.t.t }}
          ARTIFACT_BASE: ${{ matrix.s.b }}-${{ matrix.t.t }}
          EXE: ${{ env.EXE }}
        run: |
          RELEASE_DIR="target/${TARGET}/release"
          declare -a BINS=()

          if [[ -n "$NAMES_INPUT" ]]; then
            IFS=',' read -ra NAME_LIST <<< "$NAMES_INPUT"
            for name in "${NAME_LIST[@]}"; do
              name="${name# }"; name="${name% }"
              while IFS= read -r -d '' f; do
                fname=$(basename "$f")
                [[ "$fname" == *.* ]] && continue
                BINS+=("$fname")
              done < <(find "$RELEASE_DIR" -maxdepth 1 -name "${name}${EXE}" -type f -print0 2>/dev/null)
            done
          else
            while IFS= read -r -d '' f; do
              fname=$(basename "$f")
              [[ -x "$f" ]] || continue
              BINS+=("$fname")
            done < <(find "$RELEASE_DIR" -maxdepth 1 \( -type f -o -type l \) \
              \( -name "*${EXE}" -o ! -name "*.*" \) -print0 2>/dev/null | sort -z)
          fi

          if [[ ${#BINS[@]} -eq 0 ]]; then
            echo "::error::未找到任何匹配的二进制文件，请检查 n 参数或构建产物"
            exit 1
          fi

          echo "找到以下二进制文件: ${BINS[*]}"

          if [[ "$USE_UPX" != "false" ]]; then
            for bin in "${BINS[@]}"; do
              echo "UPX 压缩: $bin"
              upx --best --lzma "${RELEASE_DIR}/${bin}" || echo "::warning::UPX 压缩 $bin 失败（可能不支持该格式），跳过"
            done
          else
            echo "已跳过 UPX 压缩"
          fi

          echo "打包文件到 ${ARTIFACT_BASE}.txz ..."
          tar -cf - -C "$RELEASE_DIR" "${BINS[@]}" | \
            xz -9evvM55% -T1 --block-size=256M \
               --lzma2=preset=9e,dict=32M,depth=1000 \
            > "${ARTIFACT_BASE}.txz"

          echo "打包完成: ${ARTIFACT_BASE}.txz"
          ls -lh "${ARTIFACT_BASE}.txz"

      - name: Generate checksums and summary table
        shell: bash
        env:
          TARGET: ${{ matrix.t.t }}
          ARTIFACT_BASE: ${{ matrix.s.b }}-${{ matrix.t.t }}
          EXE: ${{ env.EXE }}
          NAMES_INPUT: ${{ github.event.inputs.n }}
        run: |
          RELEASE_DIR="target/${TARGET}/release"
          TXZ="${ARTIFACT_BASE}.txz"

          # ── CRC-64/XZ（XZ Utils 内置，输出格式: "CRC64 (file) = HEXVAL"）──
          crc64() {
            # xz --check=crc64 仅校验，不输出值；改用 python3 快速计算
            # poly=0xad93d23594c935a9 (CRC-64/XZ aka CRC-64/ECMA-182)
            python3 - "$1" <<'PYEOF'
          import sys, struct
          POLY = 0xad93d23594c935a9
          table = []
          for i in range(256):
              crc = i
              for _ in range(8):
                  crc = (crc >> 1) ^ (POLY if crc & 1 else 0)
              table.append(crc)
          crc = 0xffffffffffffffff
          with open(sys.argv[1], 'rb') as f:
              for chunk in iter(lambda: f.read(65536), b''):
                  for b in chunk:
                      crc = (crc >> 8) ^ table[(crc ^ b) & 0xff]
          print(format(crc ^ 0xffffffffffffffff, '016x'))
          PYEOF
          }

          sha256() { sha256sum "$1" | awk '{print $1}'; }
          sha512() { sha512sum "$1" | awk '{print $1}'; }

          # ── 收集要计算的二进制列表（与 Package 步骤逻辑一致）──
          declare -a BINS=()
          if [[ -n "$NAMES_INPUT" ]]; then
            IFS=',' read -ra NAME_LIST <<< "$NAMES_INPUT"
            for name in "${NAME_LIST[@]}"; do
              name="${name# }"; name="${name% }"
              while IFS= read -r -d '' f; do
                fname=$(basename "$f")
                [[ "$fname" == *.* ]] && continue
                BINS+=("$fname")
              done < <(find "$RELEASE_DIR" -maxdepth 1 -name "${name}${EXE}" -type f -print0 2>/dev/null)
            done
          else
            while IFS= read -r -d '' f; do
              [[ -x "$f" ]] || continue
              BINS+=("$(basename "$f")")
            done < <(find "$RELEASE_DIR" -maxdepth 1 \( -type f -o -type l \) \
              \( -name "*${EXE}" -o ! -name "*.*" \) -print0 2>/dev/null | sort -z)
          fi

          # ── 写入 Job Summary ──
          {
            echo "## $ARTIFACT_BASE"
            echo ""
            echo "| 文件 | CRC-64/XZ | SHA-256 | SHA-512 |"
            echo "|------|-----------|---------|---------|"

            # 二进制行
            for bin in "${BINS[@]}"; do
              f="${RELEASE_DIR}/${bin}"
              c=$(crc64 "$f")
              s2=$(sha256 "$f")
              s5=$(sha512 "$f")
              echo "| \`${bin}\` (二进制) | \`$c\` | \`$s2\` | \`$s5\` |"
            done

            # 压缩包行
            c=$(crc64 "$TXZ")
            s2=$(sha256 "$TXZ")
            s5=$(sha512 "$TXZ")
            echo "| \`${TXZ}\` (压缩包) | \`$c\` | \`$s2\` | \`$s5\` |"

          [[ -n "${{ github.event.inputs.name }}" ]] && echo "_${{ github.event.inputs.name }}_" >> "$GITHUB_STEP_SUMMARY"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.s.b }}-${{ matrix.t.t }}
          path: ${{ matrix.s.b }}-${{ matrix.t.t }}.txz