name: Build Static Node.js (aarch64-linux-musl)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version (务必带v, 例如: v24.15.0)'
        required: true
        default: 'v24.15.0'

env:
  NODE_VERSION: ${{ github.event.inputs.node_version || 'v24.15.0' }}
  # 强制 actions 使用 Node24，完美应对 2026 年的弃用限制 (出现的黄色警告无视即可)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_static_node:
    name: Build aarch64 musl static
    runs-on: ubuntu-24.04

    steps:
      # 1. 扩容与防崩溃机制（解决 Exit Code 4 的核心所在）
      - name: Free Disk Space & Enable Swap
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          swap-storage: true # 关键：为你增加高达 4GB 的虚拟内存，彻底杜绝编译 V8 引擎时内存溢出

      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 精准下载源码（如果填错版本号，这里会直接明确报错，不再是莫名其妙的 Exit 1）
      - name: Download Node.js Source
        run: |
          echo "Fetching Node.js $NODE_VERSION..."
          URL="https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}.tar.gz"
          if ! curl -f -sSLO "$URL"; then
            echo "❌ 错误: 找不到指定版本，请检查版本号 $NODE_VERSION 是否已在 Node.js 官网发布。"
            exit 1
          fi
          tar -xzf node-${NODE_VERSION}.tar.gz

      # 3. 注入纯净的 musl 交叉编译工具链
      - name: Setup musl.cc Toolchain
        run: |
          echo "Downloading aarch64-linux-musl cross-compiler..."
          curl -sSLO https://musl.cc/aarch64-linux-musl-cross.tgz
          tar -xzf aarch64-linux-musl-cross.tgz
          echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH

      # 4. 安装宿主机构建依赖
      - name: Install Host Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential make ninja-build curl file

      # 5. 核心编译环节
      - name: Cross-compile Node.js
        run: |
          cd node-${NODE_VERSION}
          
          # ===== 目标设备 (Target) 工具链 =====
          export CC="aarch64-linux-musl-gcc"
          export CXX="aarch64-linux-musl-g++"
          export AR="aarch64-linux-musl-ar"
          export NM="aarch64-linux-musl-nm"
          export LD="aarch64-linux-musl-ld"
          export RANLIB="aarch64-linux-musl-ranlib"
          export STRIP="aarch64-linux-musl-strip"
          
          # ===== 宿主机 (Host) 工具链 =====
          # 供 mksnapshot 等 Node 内部生成工具在打包机本地执行
          export CC_host="gcc"
          export CXX_host="g++"
          export AR_host="ar"
          export NM_host="nm"
          export LD_host="ld"
          
          # ===== 编译标志 =====
          export CFLAGS="-static -O2 -ffunction-sections -fdata-sections"
          export CXXFLAGS="-static -O2 -ffunction-sections -fdata-sections"
          export LDFLAGS="-static -Wl,--gc-sections -Wl,--strip-all"
          
          echo "开始配置 Node.js 编译环境..."
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=linux \
            --fully-static \
            --without-snapshot \
            --with-intl=none \
            --cross-compiling
          
          # 关键点：强制限制为 -j2 (2个并发)，用时间换取空间，100% 避免因为并发过高导致的 Exit 4
          echo "开始执行编译 (限流防崩溃模式)..."
          make -j2 V=1
          
          echo "执行体积裁剪..."
          $STRIP out/Release/node
          
          mkdir -p ../artifacts
          cp out/Release/node ../artifacts/node-${NODE_VERSION}-linux-arm64-musl-static
          
      # 6. 自动验证文件类型
      - name: Verify Binary
        run: |
          cd artifacts
          echo "构建产物详情:"
          file node-${NODE_VERSION}-linux-arm64-musl-static
          
      # 7. 上传最终产物供下载
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ env.NODE_VERSION }}-linux-arm64-musl
          path: artifacts/
