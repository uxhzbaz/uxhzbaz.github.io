name: B
on:
  workflow_dispatch:
    inputs:
      u:
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      t:
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
      l:
        description: 'cargo build --locked[ture/false]'
        default: 'true'
        required: false
      bn:
        description: 'Binary names (comma-separated, empty=auto detect)'
        default: ''
        required: false
      upx:
        description: 'Enable UPX compression'
        type: boolean
        default: true

jobs:
  s:
    runs-on: ubuntu-latest
    outputs:
      s: ${{ steps.p.outputs.s }}
      t: ${{ steps.p.outputs.t }}
    steps:
      - id: p
        shell: bash
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
          BN: ${{ github.event.inputs.bn }}
        run: |
          sources='['; IFS=','; i=0; bn=(); for n in $BN; do bn+=("${n# }"); done
          for u in $U; do
            u=${u# }; u=${u% }
            r=${u%%/archive/*}; r=${r##*/}
            if [ $i -lt ${#bn[@]} ]; then b="${bn[$i]}"
            else b="$r"; [ "$r" = "magic-wormhole.rs" ] && b="wormhole-rs"; fi
            ((i++))
            sources+="{\"u\":\"$u\",\"b\":\"$b\"},"
          done; sources="${sources%,}]"
          targets='['; for t in $T; do
            t=${t# }; t=${t% }
            case $t in
              *windows*) o=windows-latest ;;
              *apple*) o=macos-latest ;;
              *) o=ubuntu-latest ;;
            esac
            c=''; [[ $t == *riscv* ]] && c='--no-default-features'
            targets+="{\"t\":\"$t\",\"o\":\"$o\",\"c\":\"$c\"},"
          done; targets="${targets%,}]"
          echo "s=$sources" >> $GITHUB_OUTPUT
          echo "t=$targets" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: ${{ matrix.s.b }}-${{ matrix.t.t }}
    runs-on: ${{ matrix.t.o }}
    strategy:
      matrix:
        s: ${{ fromJSON(needs.s.outputs.s) }}
        t: ${{ fromJSON(needs.s.outputs.t) }}
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools upx-ucl xz-utils
      - if: runner.os == 'Windows'
        run: choco install upx
      - if: runner.os == 'macOS'
        run: brew install upx xz
      - shell: bash
        run: |
          curl -sL ${{ matrix.s.u }} | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || (grep -q '^\[profile\.release\]' Cargo.toml && perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)
      - uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          args: --release ${{ github.event.inputs.l != 'false' && '--locked' || '' }} ${{ matrix.t.c }}
          target: ${{ matrix.t.t }}
      - name: Set exe extension
        if: runner.os == 'Windows'
        run: echo "EXE=.exe" >> $GITHUB_ENV
      - name: Find and rename binary
        shell: bash
        run: |
          RELEASE_DIR="target/${{ matrix.t.t }}/release"
          DEST="$RELEASE_DIR/${{ matrix.s.b }}${{ env.EXE }}"
          if [ ! -f "$DEST" ]; then
            FOUND=$(find "$RELEASE_DIR" -maxdepth 1 -type f -name "${{ matrix.s.b }}*${{ env.EXE }}" ! -name "*.d" ! -name "*.rlib" | head -1)
            if [ -z "$FOUND" ]; then
              FOUND=$(find "$RELEASE_DIR" -maxdepth 1 -type f -executable ! -name "*.d" ! -name "*.rlib" ! -name "build" | head -1)
            fi
            [ -n "$FOUND" ] && mv "$FOUND" "$DEST"
          fi
      - name: UPX compress
        if: ${{ github.event.inputs.upx != 'false' }}
        shell: bash
        run: |
          upx --best --lzma "target/${{ matrix.t.t }}/release/${{ matrix.s.b }}${{ env.EXE }}"
      - shell: bash
        run: |
          A="${{ matrix.s.b }}-${{ matrix.t.t }}"
          tar -cf - -C "target/${{ matrix.t.t }}/release" "${{ matrix.s.b }}${{ env.EXE }}" | \
          xz -9evvM55% -T1 --block-size=256M --lzma2=preset=9e,dict=32M,depth=1000 > "$A.txz"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.s.b }}-${{ matrix.t.t }}
          path: ${{ matrix.s.b }}-${{ matrix.t.t }}.txz