name: B
on:
  workflow_dispatch:
    inputs:
      u:
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      t:
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
      l:
        default: 'true'
        required: false
      n:
        default: ''
        required: false
      upx:
        default: 'true'
        required: false

jobs:
  s:
    runs-on: ubuntu-latest
    outputs:
      s: ${{ steps.p.outputs.s }}
      t: ${{ steps.p.outputs.t }}
    steps:
      - id: p
        shell: bash
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
        run: |
          s='['; IFS=','; for u in $U; do u=${u# }; u=${u% }; r=${u%%/archive/*}; r=${r##*/}; tag=${u##*/archive/refs/tags/}; tag=${tag%.tar*}; b="${r}-${tag}"; s+="{\"u\":\"$u\",\"r\":\"$r\",\"b\":\"$b\"},"; done; s="${s%,}]"
          t='['; for x in $T; do x=${x# }; x=${x% }; o=${x//*windows*/windows-latest}; o=${o//*apple*/macos-latest}; o=${o:=ubuntu-latest}; c=''; [[ $x == *riscv* ]] && c='--no-default-features'; t+="{\"t\":\"$x\",\"o\":\"$o\",\"c\":\"$c\"},"; done; t="${t%,}]"
          echo "s=$s" >> $GITHUB_OUTPUT
          echo "t=$t" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: ${{ matrix.s.b }}-${{ matrix.t.t }}
    runs-on: ${{ matrix.t.o }}
    strategy:
      matrix:
        s: ${{ fromJSON(needs.s.outputs.s) }}
        t: ${{ fromJSON(needs.s.outputs.t) }}
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools upx-ucl xz-utils
      - if: runner.os == 'Windows'
        run: choco install upx
      - if: runner.os == 'macOS'
        run: brew install upx xz
      - name: Download source
        shell: bash
        run: |
          curl -sL ${{ matrix.s.u }} | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || (grep -q '^\[profile\.release\]' Cargo.toml && perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)
      - uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          args: --release ${{ github.event.inputs.l != 'false' && '--locked' || '' }} ${{ matrix.t.c }}
          target: ${{ matrix.t.t }}
      - name: Set exe
        if: runner.os == 'Windows'
        shell: bash
        run: echo "EXE=.exe" >> $GITHUB_ENV
      - name: Package
        shell: bash
        env:
          N: ${{ github.event.inputs.n }}
          U: ${{ github.event.inputs.upx }}
          TGT: ${{ matrix.t.t }}
          ART: ${{ matrix.s.b }}-${{ matrix.t.t }}
          EXE: ${{ env.EXE }}
        run: |
          D="target/${TGT}/release"
          declare -a B=()
          if [[ -n "$N" ]]; then IFS=',' read -ra L <<< "$N"; for n in "${L[@]}"; do n=${n# }; n=${n% }; while IFS= read -r -d '' f; do f=$(basename "$f"); [[ "$f" == *.* ]] && continue; B+=("$f"); done < <(find "$D" -maxdepth 1 -name "${n}${EXE}" -type f -print0); done
          else while IFS= read -r -d '' f; do [[ -x "$f" ]] || continue; B+=("$(basename "$f")"); done < <(find "$D" -maxdepth 1 \( -type f -o -type l \) \( -name "*${EXE}" -o ! -name "*.*" \) -print0 | sort -z); fi
          [[ ${#B[@]} -eq 0 ]] && echo "::error::无二进制" && exit 1
          [[ "$U" != "false" ]] && for f in "${B[@]}"; do upx --best --lzma "$D/$f" || echo "::warning::UPX $f 失败"; done
          tar -cf - -C "$D" "${B[@]}" | xz -9evvM55% -T1 --block-size=256M --lzma2=preset=9e,dict=32M,depth=1000 > "${ART}.txz"
      - name: Checksums
        shell: bash
        env:
          TGT: ${{ matrix.t.t }}
          ART: ${{ matrix.s.b }}-${{ matrix.t.t }}
          EXE: ${{ env.EXE }}
          N: ${{ github.event.inputs.n }}
        run: |
          D="target/${TGT}/release"
          TXZ="${ART}.txz"
          crc64(){ python3 - "$1"<<'E' 
import sys,struct;POLY=0xad93d23594c935a9;T=[];[(T.append(((i>>1)^(POLY if i&1 else 0)) for _ in range(8))) for i in range(256)];c=0xffffffffffffffff
with open(sys.argv[1],"rb") as f:
 for b in f.read():
  c=(c>>8)^T[(c^b)&0xff]
print(format(c^0xffffffffffffffff,'016x'))
E
}
          sha256(){ sha256sum "$1"|awk '{print $1}'; }
          sha512(){ sha512sum "$1"|awk '{print $1}'; }
          declare -a B=()
          if [[ -n "$N" ]]; then IFS=',' read -ra L <<< "$N"; for n in "${L[@]}"; do n=${n# }; n=${n% }; while IFS= read -r -d '' f; do f=$(basename "$f"); [[ "$f" == *.* ]] && continue; B+=("$f"); done < <(find "$D" -maxdepth 1 -name "${n}${EXE}" -type f -print0); done
          else while IFS= read -r -d '' f; do [[ -x "$f" ]] || continue; B+=("$(basename "$f")"); done < <(find "$D" -maxdepth 1 \( -type f -o -type l \) \( -name "*${EXE}" -o ! -name "*.*" \) -print0 | sort -z); fi
          { echo "| ${ART} |"; echo "|----|"; for f in "${B[@]}"; do echo "| CRC64/XZ: $(crc64 "$D/$f") |"; echo "| SHA256: $(sha256 "$D/$f") |"; echo "| SHA512: $(sha512 "$D/$f") |"; done; echo "| CRC64/XZ: $(crc64 "$TXZ") |"; echo "| SHA256: $(sha256 "$TXZ") |"; echo "| SHA512: $(sha512 "$TXZ") |"; } >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.s.b }}-${{ matrix.t.t }}
          path: ${{ matrix.s.b }}-${{ matrix.t.t }}.txz