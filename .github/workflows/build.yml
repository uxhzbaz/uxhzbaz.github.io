name: Build Static Node.js (aarch64-linux-musl)

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version to build'
        required: true
        default: 'v24.15.0'

env:
  NODE_VERSION: ${{ github.event.inputs.node_version || 'v24.15.0' }}
  MUSL_CROSS_URL: https://musl.cc/aarch64-linux-musl-cross.tgz
  MUSL_CROSS_DIR: aarch64-linux-musl-cross

jobs:
  build_aarch64_static:
    name: Build aarch64 musl static
    # 使用 22.04 或 ubuntu-latest，以满足现代 C++ 编译器的需求
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Host Build Dependencies
        # 安装主机端的编译必需品：Python 3 (Node.js 构建系统必需), GCC/G++ (用于构建 Host 工具)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 build-essential make wget tar file ninja-build

      - name: Download and extract musl cross toolchain
        run: |
          echo "Downloading $MUSL_CROSS_URL ..."
          wget -q ${{ env.MUSL_CROSS_URL }} -O musl-cross.tgz
          tar -xzf musl-cross.tgz
          # 将交叉编译工具链加入系统 PATH
          echo "$PWD/${{ env.MUSL_CROSS_DIR }}/bin" >> $GITHUB_PATH

      - name: Download Node.js source
        run: |
          echo "Downloading Node.js $NODE_VERSION ..."
          wget -q https://github.com/nodejs/node/archive/refs/tags/${{ env.NODE_VERSION }}.tar.gz
          tar -xzf ${{ env.NODE_VERSION }}.tar.gz

      - name: Configure and Build Node.js
        run: |
          cd node-${{ env.NODE_VERSION }}
          
          # Target (目标设备) 编译器：aarch64-linux-musl
          export CC="aarch64-linux-musl-gcc"
          export CXX="aarch64-linux-musl-g++"
          export AR="aarch64-linux-musl-ar"
          export RANLIB="aarch64-linux-musl-ranlib"
          export LD="aarch64-linux-musl-ld"
          
          # Host (当前宿主机) 编译器：用于编译 mksnapshot 等本地工具
          export CC_host="gcc"
          export CXX_host="g++"
          
          # 强制完全静态的编译参数
          export CFLAGS="-static -O2 -ffunction-sections -fdata-sections"
          export CXXFLAGS="-static -O2 -ffunction-sections -fdata-sections"
          export LDFLAGS="-static -Wl,--gc-sections -Wl,--strip-all"
          
          # 执行配置
          # 1. --fully-static: 声明要求构建完全静态的二进制文件
          # 2. 移除所有 --shared-* 以便利用源码中自带的 openssl、zlib 等，防止动态库链接污染
          # 3. --without-snapshot: 避免跨架构生成 V8 快照崩溃
          # 4. --with-intl=none: 静态链接禁用 ICU 国际化以减少体积和编译错误
          ./configure \
            --dest-cpu=arm64 \
            --dest-os=linux \
            --fully-static \
            --without-snapshot \
            --with-intl=none \
            --cross-compiling
          
          # 开始多线程编译
          make -j$(nproc)

      - name: Strip binary and Verify
        run: |
          cd node-${{ env.NODE_VERSION }}
          
          # 使用对应的 strip 工具缩减体积
          aarch64-linux-musl-strip out/Release/node
          
          mkdir -p ../artifacts
          cp out/Release/node ../artifacts/node-aarch64-musl-static
          
          # 验证是否为完全静态链接 (预期输出：statically linked, no section header 等)
          echo "Verification (File info):"
          file ../artifacts/node-aarch64-musl-static
          
          # ldd 如果检测到动态链接库会输出内容，如果是完全静态它应该报错 “not a dynamic executable” 
          echo "Verification (ldd info):"
          ldd ../artifacts/node-aarch64-musl-static || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ env.NODE_VERSION }}-aarch64-musl-static
          path: artifacts/node-aarch64-musl-static
