name: B
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
    inputs:
      u:
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      t:
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
jobs:
  s:
    runs-on: ubuntu-latest
    outputs:
      u: ${{ steps.p.outputs.u }}
      t: ${{ steps.p.outputs.t }}
    steps:
      - id: p
        shell: python
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
        run: |
          import os,json
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
           f.write("u="+json.dumps([u.strip() for u in os.environ['U'].split(',')])+"\n")
           f.write("t="+json.dumps([{'t':t.strip(),'o':'windows-latest' if 'windows' in t else 'macos-latest' if 'apple' in t else 'ubuntu-latest','c':'--no-default-features' if 'riscv' in t else ''} for t in os.environ['T'].split(',')])+"\n")
  b:
    needs: s
    runs-on: ${{ matrix.t.o }}
    strategy:
      matrix:
        u: ${{ fromJSON(needs.s.outputs.u) }}
        t: ${{ fromJSON(needs.s.outputs.t) }}
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - if: startsWith(matrix.t.o, 'ubuntu')
        run: sudo apt install -y musl-tools
      - shell: bash
        run: |
          curl -sL ${{ matrix.u }} -o s.tgz
          tar -xzf s.tgz --strip-components=1
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || (grep -q '^\[profile\.release\]' Cargo.toml && perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)
          echo "N=$(echo '${{ matrix.u }}' | awk -F/ '{print $5}')" >> $GITHUB_ENV
      - uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          args: --release --locked ${{ matrix.t.c }}
          target: ${{ matrix.t.t }}
      - name: Set exe extension for Windows
        run: echo "EXE=.exe" >> $env:GITHUB_ENV
        if: startsWith(matrix.t.o, 'windows')
      - shell: bash
        run: |
          mkdir out
          for f in target/${{ matrix.t.t }}/release/*; do
            if [[ -f "$f" && (! "$f" == *.* || "$f" == *.exe) ]]; then cp "$f" out/; fi
          done
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.N }}-${{ matrix.t.t }}
          path: out/*