name: B
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  workflow_dispatch:
    inputs:
      run_name:
        description: '工作流运行名称'
        default: ''
        required: false
      u:
        description: '源码包URL，逗号分隔'
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      t:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
      l:
        description: 'cargo build --locked (true/false)'
        default: 'false'
        required: true
      n:
        description: '打包的二进制名称，逗号分隔（留空自动检测，支持通配符）'
        default: ''
        required: false
      upx:
        description: 'UPX 压缩 (true/false)'
        default: 'true'
        required: false

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      first_key: ${{ steps.p.outputs.first_key }}
    steps:
      - id: p
        shell: bash
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
        run: |
          include='[]'
          first_key=''

          IFS=',' read -ra URLS <<< "$U"
          IFS=',' read -ra TARGETS <<< "$T"

          for u in "${URLS[@]}"; do
            u="${u# }"; u="${u% }"
            r="${u%%/archive/*}"; r="${r##*/}"
            tag="${u##*/archive/refs/tags/}"
            tag="${tag%.tar.gz}"; tag="${tag%.tar.xz}"; tag="${tag%.zip}"
            tag="${tag%.tgz}"; tag="${tag%.*}"
            b="${r}-${tag}"

            for t in "${TARGETS[@]}"; do
              t="${t# }"; t="${t% }"
              case "$t" in
                *windows*) o="windows-latest" ;;
                *apple*)   o="macos-latest"   ;;
                *)         o="ubuntu-latest"  ;;
              esac
              c=""
              [[ "$t" == *riscv* ]] && c="--no-default-features"

              include=$(jq \
                --arg u "$u" --arg r "$r" --arg b "$b" \
                --arg t "$t" --arg o "$o" --arg c "$c" \
                '. += [{"u":$u,"r":$r,"b":$b,"t":$t,"o":$o,"c":$c}]' \
                <<< "$include")

              [[ -z "$first_key" ]] && first_key="${b}|${t}"
            done
          done

          matrix=$(jq -c '{"include":.}' <<< "$include")
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "first_key=$first_key" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: ${{ matrix.b }}-${{ matrix.t }}
    runs-on: ${{ matrix.o }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    steps:
      - if: runner.os == 'Linux'
        name: 安装依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: musl-tools upx-ucl libelf-dev zlib1g-dev linux-headers-generic
          version: 1.0

      - if: runner.os == 'Linux'
        name: 修复 musl asm 头文件路径
        run: |
          arch="${{ matrix.t }}"
          case "$arch" in
            x86_64*)  sudo ln -sf /usr/include/x86_64-linux-gnu/asm /usr/include/asm ;;
            aarch64*) sudo ln -sf /usr/include/aarch64-linux-gnu/asm /usr/include/asm ;;
            i686*)    sudo ln -sf /usr/include/i386-linux-gnu/asm    /usr/include/asm ;;
            arm*)     sudo ln -sf /usr/include/arm-linux-gnueabihf/asm /usr/include/asm ;;
          esac

      - if: runner.os == 'Windows'
        name: 安装依赖
        run: choco install upx

      - if: runner.os == 'macOS'
        name: 安装依赖
        run: brew install upx

      - name: 下载并解压源码
        shell: bash
        run: |
          curl -sL "${{ matrix.u }}" | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || \
            (grep -q '^\[profile\.release\]' Cargo.toml && \
              perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || \
              printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)

      - uses: houseabsolute/actions-rust-cross@v1
        name: 编译
        env:
          ALSA_NO_PKG_CONFIG: 1
          PKG_CONFIG_ALLOW_CROSS: 1
        with:
          command: build
          args: --release ${{ github.event.inputs.l != 'false' && '--locked' || '' }} ${{ matrix.c }}
          target: ${{ matrix.t }}

      - if: runner.os == 'Windows'
        name: 设置exe后缀
        shell: bash
        run: echo "EXE=.exe" >> $GITHUB_ENV

      - name: 生成摘要并上传
        shell: bash
        env:
          NAMES_INPUT: ${{ github.event.inputs.n }}
          USE_UPX: ${{ github.event.inputs.upx }}
          TARGET: ${{ matrix.t }}
          AB: ${{ matrix.b }}-${{ matrix.t }}
          IS_FIRST: ${{ format('{0}|{1}', matrix.b, matrix.t) == needs.s.outputs.first_key }}
        run: |
          RD="target/${TARGET}/release"
          declare -a BINS=()

          if [[ -n "$NAMES_INPUT" ]]; then
            IFS=',' read -ra NL <<< "$NAMES_INPUT"
            for name in "${NL[@]}"; do
              name="${name# }"; name="${name% }"
              while IFS= read -r -d '' f; do
                fname=$(basename "$f")
                [[ "$fname" == *.* ]] && continue
                BINS+=("$fname")
              done < <(find "$RD" -maxdepth 1 -name "${name}${EXE}" -type f -print0 2>/dev/null)
            done
          else
            while IFS= read -r -d '' f; do
              [[ -x "$f" ]] || continue
              fname=$(basename "$f")
              BINS+=("$fname")
            done < <(find "$RD" -maxdepth 1 \( -type f -o -type l \) \( -name "*${EXE}" -o ! -name "*.*" \) -print0 2>/dev/null | sort -z)
          fi

          [[ ${#BINS[@]} -eq 0 ]] && { echo "::error::未找到任何匹配的二进制文件"; exit 1; }

          if [[ "$USE_UPX" != "false" ]]; then
            for bin in "${BINS[@]}"; do
              upx --best --lzma "${RD}/${bin}" && echo "UPX 压缩成功: $bin" || echo "::warning::UPX 压缩失败: $bin"
            done
          fi

          declare -a BIN_ROWS=()
          for bin in "${BINS[@]}"; do
            B_S256=$(sha256sum "${RD}/${bin}" | awk '{print $1}')
            B_S512=$(sha512sum "${RD}/${bin}" | awk '{print $1}')
            B_SIZE=$(ls -lh "${RD}/${bin}" | awk '{print $5}')
            BIN_ROWS+=("${bin}|${B_SIZE}|${B_S256}|${B_S512}")
            cp "${RD}/${bin}" "./${AB}-${bin}${EXE}"
          done

          {
            echo "## \`${AB}\`"
            echo ""
            echo "### 🔧 二进制可执行文件校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            for row in "${BIN_ROWS[@]}"; do
              IFS='|' read -r bname bsize bs256 bs512 <<< "$row"
              echo "| \`${bname}\` | ${bsize} | \`${bs256}\` | \`${bs512}\` |"
            done
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_FIRST" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 工具帮助信息" >> $GITHUB_STEP_SUMMARY
            for bin in "${BINS[@]}"; do
              HELP=$("${RD}/${bin}" --help 2>&1 || true)
              {
                echo "<details><summary><code>${bin} --help</code></summary>"
                echo ""
                echo '```'
                echo "$HELP"
                echo '```'
                echo "</details>"
              } >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.b }}-${{ matrix.t }}
          path: ./${{ matrix.b }}-${{ matrix.t }}-*
