name: B
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  workflow_dispatch:
    inputs:
      run_name:
        description: 'Workflow run name'
        default: ''
        required: false
      u:
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      t:
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
      l:
        description: 'cargo build --locked (true/false)'
        default: 'true'
        required: false
      n:
        description: 'Binary names to pack, comma-separated (empty = auto-detect)'
        default: ''
        required: false
      upx:
        description: 'UPX compression (true/false)'
        default: 'true'
        required: false

jobs:
  s:
    runs-on: ubuntu-latest
    outputs:
      s: ${{ steps.p.outputs.s }}
      t: ${{ steps.p.outputs.t }}
    steps:
      - id: p
        shell: bash
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
        run: |
          sources='['; IFS=','; for u in $U; do
            u=${u# }; u=${u% }
            r=${u%%/archive/*}; r=${r##*/}
            tag=${u##*/archive/refs/tags/}
            tag=${tag%.tar.gz}; tag=${tag%.tar.xz}; tag=${tag%.zip}; tag=${tag%.tgz}; tag=${tag%.*}
            sources+="{\"u\":\"$u\",\"r\":\"$r\",\"b\":\"${r}-${tag}\"},"
          done; sources="${sources%,}]"
          targets='['; for t in $T; do
            t=${t# }; t=${t% }
            case $t in *windows*) o=windows-latest;; *apple*) o=macos-latest;; *) o=ubuntu-latest;; esac
            c=''; [[ $t == *riscv* ]] && c='--no-default-features'
            targets+="{\"t\":\"$t\",\"o\":\"$o\",\"c\":\"$c\"},"
          done; targets="${targets%,}]"
          echo "s=$sources" >> $GITHUB_OUTPUT
          echo "t=$targets" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: ${{ matrix.s.b }}-${{ matrix.t.t }}
    runs-on: ${{ matrix.t.o }}
    strategy:
      matrix:
        s: ${{ fromJSON(needs.s.outputs.s) }}
        t: ${{ fromJSON(needs.s.outputs.t) }}
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools upx-ucl xz-utils
      - if: runner.os == 'Windows'
        run: choco install upx
      - if: runner.os == 'macOS'
        run: brew install upx xz
      - name: Download and extract source
        shell: bash
        run: |
          curl -sL ${{ matrix.s.u }} | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || \
            (grep -q '^\[profile\.release\]' Cargo.toml && \
              perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || \
              printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)
      - uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          args: --release ${{ github.event.inputs.l != 'false' && '--locked' || '' }} ${{ matrix.t.c }}
          target: ${{ matrix.t.t }}
      - if: runner.os == 'Windows'
        shell: bash
        run: echo "EXE=.exe" >> $GITHUB_ENV
      - name: Pack and summary
        shell: bash
        env:
          NAMES_INPUT: ${{ github.event.inputs.n }}
          USE_UPX: ${{ github.event.inputs.upx }}
          TARGET: ${{ matrix.t.t }}
          AB: ${{ matrix.s.b }}-${{ matrix.t.t }}
        run: |
          RD="target/${TARGET}/release"
          declare -a BINS=()
          if [[ -n "$NAMES_INPUT" ]]; then
            IFS=',' read -ra NL <<< "$NAMES_INPUT"
            for name in "${NL[@]}"; do
              name="${name# }"; name="${name% }"
              while IFS= read -r -d '' f; do
                fname=$(basename "$f"); [[ "$fname" == *.* ]] && continue; BINS+=("$fname")
              done < <(find "$RD" -maxdepth 1 -name "${name}${EXE}" -type f -print0 2>/dev/null)
            done
          else
            while IFS= read -r -d '' f; do
              fname=$(basename "$f"); [[ -x "$f" ]] || continue; BINS+=("$fname")
            done < <(find "$RD" -maxdepth 1 \( -type f -o -type l \) \( -name "*${EXE}" -o ! -name "*.*" \) -print0 2>/dev/null | sort -z)
          fi
          [[ ${#BINS[@]} -eq 0 ]] && { echo "::error::No binaries found"; exit 1; }
          echo "Found: ${BINS[*]}"

          if [[ "$USE_UPX" != "false" ]]; then
            for bin in "${BINS[@]}"; do
              upx --best --lzma "${RD}/${bin}" && echo "UPX ok: $bin" || echo "::warning::UPX failed: $bin"
            done
          fi

          for bin in "${BINS[@]}"; do
            echo "--- ${bin} --help ---"
            "${RD}/${bin}" --help || true
          done

          tar -cf - -C "$RD" "${BINS[@]}" | \
            xz -9evvM55% -T1 --block-size=256M --lzma2=preset=9e,dict=32M,depth=1000 > "${AB}.txz"

          CRC=$(xz --robot --list "${AB}.txz" | awk 'NR==2{print $5}')
          S256=$(sha256sum "${AB}.txz" | awk '{print $1}')
          S512=$(sha512sum "${AB}.txz" | awk '{print $1}')
          SIZE=$(ls -lh "${AB}.txz" | awk '{print $5}')

          echo "### ${AB} (${SIZE})" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 工具-版本-三元组 | \`${AB}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| CRC64/XZ | \`${CRC}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA256 | \`${S256}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA512 | \`${S512}\` |" >> $GITHUB_STEP_SUMMARY

          for bin in "${BINS[@]}"; do
            HELP=$("${RD}/${bin}" --help 2>&1 || true)
            echo "<details><summary>${bin} --help</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$HELP" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.s.b }}-${{ matrix.t.t }}
          path: ${{ matrix.s.b }}-${{ matrix.t.t }}.txz