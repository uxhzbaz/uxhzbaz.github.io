name: B
on:
  workflow_dispatch:
    inputs:
      source:
        description: 'P'
        type: choice
        options: [all, miniserve, wormhole-rs]
        default: all
      target:
        description: 'T'
        type: choice
        options: [all, x86_64-unknown-linux-musl, x86_64-unknown-linux-gnu, aarch64-unknown-linux-musl, aarch64-unknown-linux-gnu, armv7-unknown-linux-musleabihf, armv7-unknown-linux-gnueabihf, arm-unknown-linux-musleabihf, riscv64gc-unknown-linux-gnu, x86_64-pc-windows-msvc, i686-pc-windows-msvc, x86_64-apple-darwin, aarch64-apple-darwin, x86_64-unknown-freebsd, x86_64-unknown-illumos]
        default: all
jobs:
  b:
    if: (inputs.source == 'all' || inputs.source == matrix.s.b) && (inputs.target == 'all' || inputs.target == matrix.t.t)
    runs-on: ${{ matrix.t.o }}
    strategy:
      fail-fast: false
      matrix:
        s:
          - {u: https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz, d: miniserve-0.35.0, b: miniserve}
          - {u: https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz, d: magic-wormhole.rs-0.8.1, b: wormhole-rs}
        t:
          - {o: ubuntu-latest, t: x86_64-unknown-linux-musl, c: ""}
          - {o: ubuntu-latest, t: x86_64-unknown-linux-gnu, c: ""}
          - {o: ubuntu-latest, t: aarch64-unknown-linux-musl, c: ""}
          - {o: ubuntu-latest, t: aarch64-unknown-linux-gnu, c: ""}
          - {o: ubuntu-latest, t: armv7-unknown-linux-musleabihf, c: ""}
          - {o: ubuntu-latest, t: armv7-unknown-linux-gnueabihf, c: ""}
          - {o: ubuntu-latest, t: arm-unknown-linux-musleabihf, c: ""}
          - {o: ubuntu-latest, t: riscv64gc-unknown-linux-gnu, c: "--no-default-features"}
          - {o: windows-latest, t: x86_64-pc-windows-msvc, c: ""}
          - {o: windows-latest, t: i686-pc-windows-msvc, c: ""}
          - {o: macos-latest, t: x86_64-apple-darwin, c: ""}
          - {o: macos-latest, t: aarch64-apple-darwin, c: ""}
          - {o: ubuntu-latest, t: x86_64-unknown-freebsd, c: ""}
          - {o: ubuntu-latest, t: x86_64-unknown-illumos, c: ""}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - if: startsWith(matrix.t.o, 'ubuntu')
        run: sudo apt install -y musl-tools
      - shell: bash
        run: |
          curl -sL ${{ matrix.s.u }} | tar -xz
          cd ${{ matrix.s.d }}
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || perl -pi -e 's/^\[profile\.release\]/[profile.release]\nstrip = true/' Cargo.toml
      - uses: houseabsolute/actions-rust-cross@v0
        with:
          command: build
          args: --manifest-path ${{ matrix.s.d }}/Cargo.toml --release --locked ${{ matrix.t.c }}
          target: ${{ matrix.t.t }}
      - shell: bash
        run: echo "E=$([[ '${{ matrix.t.o }}' == windows* ]] && echo '.exe')" >> $GITHUB_ENV
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.s.b }}-${{ matrix.t.t }}
          path: ${{ matrix.s.d }}/target/${{ matrix.t.t }}/release/${{ matrix.s.b }}${{ env.E }}