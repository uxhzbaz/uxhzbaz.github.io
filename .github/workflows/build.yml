name: Build Unofficial Node.js (linux-arm64-musl)

on: 
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version (e.g., v25.9.0)'     
        required: true
        default: 'v25.9.0'

env:
  NODE_VERSION: ${{ github.event.inputs.node_version || 'v25.9.0' }}
  # 彻底解决 Node.js 20 弃用警告，强制 Actions 使用 Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_linux_arm64_musl:
    name: Build linux-arm64-musl
    runs-on: ubuntu-latest
    
    steps:
      - name: Free Disk Space
        # 编译 Node.js 与构建跨平台 Docker 镜像非常耗费磁盘空间，此插件可腾出约 30GB 空间防止磁盘被打满
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout unofficial-builds
        uses: actions/checkout@v4
        with:
          repository: nodejs/unofficial-builds
          path: unofficial-builds

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # unofficial-builds 脚本在编译完成后，需要调用 npm 上的 nodejs-dist-indexer 来生成 index.json 索引文件

      - name: Prepare Required Docker Images
        run: |
          cd unofficial-builds
          
          # unofficial-builds 依靠特制的 Docker 镜像来完成沙盒内的全自动跨平台编译
          # 我们只需要构建两个核心镜像: 源码拉取器(fetch-source) 和 目标编译环境(linux-arm64-musl)
          
          echo "Building fetch-source image..."
          if [ -f "bin/prepare-images.sh" ]; then
            chmod +x bin/prepare-images.sh
            ./bin/prepare-images.sh fetch-source
            ./bin/prepare-images.sh linux-arm64-musl
          elif make -n image-fetch-source >/dev/null 2>&1; then
            make image-fetch-source
            make image-linux-arm64-musl
          else
            # 兼容模式：直接构建
            docker build -t fetch-source -t unofficial-builds/fetch-source recipes/fetch-source
            docker build -t linux-arm64-musl -t unofficial-builds/linux-arm64-musl recipes/linux-arm64-musl
          fi

      - name: Execute Unofficial Build Script
        run: |
          # 必须将 workdir 设置为当前工作区，防止脚本在深层目录迷失导致无法创建 staging、download 和 .ccache 文件夹
          export workdir="$GITHUB_WORKSPACE"
          cd unofficial-builds
          
          chmod +x ./bin/build.sh
          
          # 正式执行交叉编译 (调用 Docker 内部工具链)
          echo "Starting build for Node ${{ env.NODE_VERSION }} targeting linux-arm64-musl..."
          ./bin/build.sh -v ${{ env.NODE_VERSION }} -r linux-arm64-musl

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-${{ env.NODE_VERSION }}-linux-arm64-musl
          # unofficial-builds 的脚本会把打包好的 .tar.gz 文件、哈希校验单 (SHASUMS256.txt) 和索引导出到该目录
          path: download/
