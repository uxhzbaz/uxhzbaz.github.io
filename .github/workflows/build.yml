name: B
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  workflow_dispatch:
    inputs:
      run_name:
        description: '工作流运行名称'
        default: ''
        required: false
      u:
        description: '源码包URL，逗号分隔'
        default: 'https://github.com/svenstaro/miniserve/archive/refs/tags/v0.35.0.tar.gz,https://github.com/magic-wormhole/magic-wormhole.rs/archive/refs/tags/0.8.1.tar.gz'
      t:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
      l:
        description: 'cargo build --locked (true/false)'
        default: 'true'
        required: false
      n:
        description: '打包的二进制名称，逗号分隔（留空自动检测，支持通配符）'
        default: ''
        required: false
      upx:
        description: 'UPX 压缩 (true/false)'
        default: 'true'
        required: false

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      first_source_first_target: ${{ steps.p.outputs.first_source_first_target }}
    steps:
      - id: p
        shell: bash
        env:
          U: ${{ github.event.inputs.u }}
          T: ${{ github.event.inputs.t }}
        run: |
          matrix='{"include":[}'
          first_sft=''
          IFS=','; sources=(); for u in $U; do
            u=${u# }; u=${u% }; sources+=("$u")
          done
          targets=(); for t in $T; do
            t=${t# }; t=${t% }; targets+=("$t")
          done

          first=true
          for u in "${sources[@]}"; do
            r=${u%%/archive/*}; r=${r##*/}
            tag=${u##*/archive/refs/tags/}
            tag=${tag%.tar.gz}; tag=${tag%.tar.xz}; tag=${tag%.zip}; tag=${tag%.tgz}; tag=${tag%.*}
            b="${r}-${tag}"
            for t in "${targets[@]}"; do
              case $t in *windows*) o=windows-latest ;; *apple*) o=macos-latest ;; *) o=ubuntu-latest ;; esac
              c=''; [[ $t == *riscv* ]] && c='--no-default-features'
              matrix+="{\"u\":\"$u\",\"r\":\"$r\",\"b\":\"$b\",\"t\":\"$t\",\"o\":\"$o\",\"c\":\"$c\"},"
              [[ "$first" == true ]] && { first_sft="${b}|${t}"; first=false; }
            done
          done
          matrix="${matrix%,}]}"
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "first_source_first_target=$first_sft" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: ${{ matrix.b }}-${{ matrix.t }}
    runs-on: ${{ matrix.o }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    steps:
      - uses: dtolnay/rust-toolchain@stable

      - if: runner.os == 'Linux'
        name: 安装依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: musl-tools upx-ucl libelf-dev zlib1g-dev
          version: 1.0

      - if: runner.os == 'Windows'
        name: 安装依赖
        run: choco install upx

      - if: runner.os == 'macOS'
        name: 安装依赖
        run: brew install upx

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.t }}-cargo

      - name: 下载并解压源码
        shell: bash
        run: |
          curl -sL ${{ matrix.u }} | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml || \
            (grep -q '^\[profile\.release\]' Cargo.toml && \
              perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml || \
              printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)

      - uses: houseabsolute/actions-rust-cross@v0
        name: 编译
        with:
          command: build
          args: --release ${{ github.event.inputs.l != 'false' && '--locked' || '' }} ${{ matrix.c }}
          target: ${{ matrix.t }}

      - if: runner.os == 'Windows'
        name: 设置exe后缀
        shell: bash
        run: echo "EXE=.exe" >> $GITHUB_ENV

      - name: 生成摘要
        shell: bash
        env:
          NAMES_INPUT: ${{ github.event.inputs.n }}
          USE_UPX: ${{ github.event.inputs.upx }}
          TARGET: ${{ matrix.t }}
          AB: ${{ matrix.b }}-${{ matrix.t }}
          IS_FIRST: ${{ format('{0}|{1}', matrix.b, matrix.t) == needs.s.outputs.first_source_first_target }}
        run: |
          RD="target/${TARGET}/release"
          declare -a BINS=()
          if [[ -n "$NAMES_INPUT" ]]; then
            IFS=',' read -ra NL <<< "$NAMES_INPUT"
            for name in "${NL[@]}"; do
              name="${name# }"; name="${name% }"
              while IFS= read -r -d '' f; do
                fname=$(basename "$f"); [[ "$fname" == *.* ]] && continue; BINS+=("$fname")
              done < <(find "$RD" -maxdepth 1 -name "${name}${EXE}" -type f -print0 2>/dev/null)
            done
          else
            while IFS= read -r -d '' f; do
              fname=$(basename "$f"); [[ -x "$f" ]] || continue; BINS+=("$fname")
            done < <(find "$RD" -maxdepth 1 \( -type f -o -type l \) \( -name "*${EXE}" -o ! -name "*.*" \) -print0 2>/dev/null | sort -z)
          fi
          [[ ${#BINS[@]} -eq 0 ]] && { echo "::error::未找到任何匹配的二进制文件"; exit 1; }

          if [[ "$USE_UPX" != "false" ]]; then
            for bin in "${BINS[@]}"; do
              upx --best --lzma "${RD}/${bin}" && echo "UPX 压缩成功: $bin" || echo "::warning::UPX 压缩失败: $bin"
            done
          fi

          declare -a BIN_ROWS=()
          for bin in "${BINS[@]}"; do
            B_S256=$(sha256sum "${RD}/${bin}" | awk '{print $1}')
            B_S512=$(sha512sum "${RD}/${bin}" | awk '{print $1}')
            B_SIZE=$(ls -lh "${RD}/${bin}" | awk '{print $5}')
            BIN_ROWS+=("${bin}|${B_SIZE}|${B_S256}|${B_S512}")
          done

          {
            echo "## \`${AB}\`"
            echo ""
            echo "### 🔧 二进制可执行文件校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            for row in "${BIN_ROWS[@]}"; do
              IFS='|' read -r bname bsize bs256 bs512 <<< "$row"
              echo "| \`${bname}\` | ${bsize} | \`${bs256}\` | \`${bs512}\` |"
            done
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_FIRST" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 工具帮助信息" >> $GITHUB_STEP_SUMMARY
            for bin in "${BINS[@]}"; do
              HELP=$("${RD}/${bin}" --help 2>&1 || true)
              {
                echo "<details><summary><code>${bin} --help</code></summary>"
                echo ""
                echo '```'
                echo "$HELP"
                echo '```'
                echo "</details>"
              } >> $GITHUB_STEP_SUMMARY
            done
          fi

          for bin in "${BINS[@]}"; do
            cp "${RD}/${bin}" "./${AB}-${bin}${EXE}"
          done
          echo "BINS_PATHS=$(ls ./${AB}-*${EXE} 2>/dev/null | tr '\n' ' ')" >> $GITHUB_ENV

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.b }}-${{ matrix.t }}
          path: ${{ env.BINS_PATHS }}