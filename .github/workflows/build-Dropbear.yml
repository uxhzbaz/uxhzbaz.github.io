name: Build & Release Static Dropbear (Zig)

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Source tarball URL (tar.gz)'
        default: 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz'
        required: true
      targets:
        description: 'Comma-separated target triples'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
        required: true

env:
  ZIG_VERSION: 0.16.0
  JOBS: 8

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          TARGETS: ${{ github.event.inputs.targets }}
        run: |
          targets='['
          IFS=','; for t in $TARGETS; do
            t=${t# }; t=${t% }
            case "$t" in
              *aarch64*|*arm*) os="ubuntu-24.04-arm" ;;
              *) os="ubuntu-latest" ;;
            esac
            targets+="{\"target\":\"$t\",\"runs_on\":\"$os\"},"
          done
          targets="${targets%,}]"
          echo "matrix=$targets" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates tar xz-utils autoconf automake make gcc g++

      - name: Download & compile with Zig
        env:
          TARGET: ${{ matrix.target }}
          SOURCE_URL: ${{ github.event.inputs.source_url }}
          ZIG_VERSION: ${{ env.ZIG_VERSION }}
          JOBS: ${{ env.JOBS }}
        run: |
          set -ev

          workdir="$(pwd)"
          builddir="$(mktemp -d)"
          trap 'rm -rf "$builddir"' EXIT

          # ---- Download Zig -----------------------------------------------
          zig_arch="$(uname -m)"
          zig_pkg="zig-${zig_arch}-linux-${ZIG_VERSION}.tar.xz"
          zig_url="https://ziglang.org/download/${ZIG_VERSION}/${zig_pkg}"
          echo "==> Downloading Zig ${ZIG_VERSION}"
          curl -fsSL "$zig_url" -o "${builddir}/${zig_pkg}"
          tar -C "$builddir" -xJf "${builddir}/${zig_pkg}"
          zig_root="$(tar -tf "${builddir}/${zig_pkg}" | head -1 | cut -d/ -f1)"
          ZIG_BIN="${builddir}/${zig_root}/zig"
          export PATH="${builddir}/${zig_root}:$PATH"
          "$ZIG_BIN" version

          # ---- Download & extract source ----------------------------------
          echo "==> Fetching source: $SOURCE_URL"
          src_tar="${builddir}/source.tar.gz"
          curl -fsSL "$SOURCE_URL" -o "$src_tar"
          mkdir "${builddir}/src"
          tar -xzf "$src_tar" -C "${builddir}/src" --strip-components=1 || true
          cd "${builddir}/src"

          # ---- Configure & build (dropbear-specific) ----------------------
          CC="${ZIG_BIN} cc -target ${TARGET}" \
          CFLAGS="-Os -fno-pie" \
          LDFLAGS="-static -no-pie" \
          CPPFLAGS="-DDROPBEAR_X11FWD" \
          ./configure \
            --host="${TARGET}" \
            --disable-pam \
            --disable-zlib \
            --enable-bundled-libtom \
            --enable-static

          echo "==> Building dropbear multi"
          make -j "${JOBS}" PROGRAMS="dropbear dbclient dropbearkey dropbearconvert scp" STATIC=1

          [[ -x ./dropbear ]] || { echo "Build failed: dropbear missing"; exit 1; }
          strip ./drop* dbclient scp || true

          # ---- Package ----------------------------------------------------
          stage_dir="${builddir}/stage/dropbear-${TARGET}"
          mkdir -p "$stage_dir"
          cp ./dropbear* dbclient scp "$stage_dir/"

          out_tar="${workdir}/dropbear-${TARGET}.tar.xz"
          echo "==> Packing ${out_tar}"
          tar -C "${builddir}/stage" -cJf "$out_tar" "dropbear-${TARGET}"

          sha256sum "$out_tar" | tee "${out_tar}.SHA256"
          echo "Done: ${out_tar}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ matrix.target }}
          overwrite: true
          path: |
            dropbear-${{ matrix.target }}.tar.xz
            dropbear-${{ matrix.target }}.tar.xz.SHA256

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/**/dropbear-*.tar.xz
            dist/**/dropbear-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}