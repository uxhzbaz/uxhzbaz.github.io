name: Build Dropbear

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-musl
            runs_on: ubuntu-latest
          - target: aarch64-linux-musl
            runs_on: ubuntu-24.04-arm

    env:
      DROPBEAR_VERSION: 2026.91
      ZIG_VERSION: 0.15.1
      JOBS: 8

    steps:
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates tar xz-utils autoconf automake make gcc g++ cmake ninja-build

      - name: Build static dropbearmulti (musl)
        env:
          TARGET: ${{ matrix.target }}
          DROPBEAR_VERSION: ${{ env.DROPBEAR_VERSION }}
          ZIG_VERSION: ${{ env.ZIG_VERSION }}
          JOBS: ${{ env.JOBS }}
        run: |
          set -ev

          workdir="$(pwd)"
          builddir="$(mktemp -d)"
          trap 'rm -rf "$builddir"' EXIT

          # ---- Download Zig -------------------------------------------------
          zig_arch=$(uname -m)
          zig_pkg="zig-${zig_arch}-linux-${ZIG_VERSION}.tar.xz"
          zig_url="https://ziglang.org/download/${ZIG_VERSION}/${zig_pkg}"
          echo "Downloading Zig ${ZIG_VERSION}..."
          curl -fsSL "$zig_url" -o "${builddir}/${zig_pkg}"
          tar -C "$builddir" -xJf "${builddir}/${zig_pkg}"
          zig_root=$(tar -tf "${builddir}/${zig_pkg}" | head -1 | cut -d/ -f1)
          ZIG_BIN="${builddir}/${zig_root}/zig"
          export PATH="${builddir}/${zig_root}:$PATH"
          "${ZIG_BIN}" version

          # ---- Download Dropbear source from GitHub tag --------------------
          dropbear_url="https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_${DROPBEAR_VERSION}.tar.gz"
          dropbear_tar="dropbear-${DROPBEAR_VERSION}.tar.gz"
          echo "Downloading Dropbear ${DROPBEAR_VERSION} from GitHub..."
          curl -fsSL "$dropbear_url" -o "${builddir}/${dropbear_tar}"
          echo "Extracting Dropbear..."
          tar -C "$builddir" -xzf "${builddir}/${dropbear_tar}"
          cd "${builddir}/dropbear-DROPBEAR_${DROPBEAR_VERSION}"

          # ---- Build (static, musl) ----------------------------------------
          echo "Configuring for ${TARGET}…"
          CC="${ZIG_BIN} cc -target ${TARGET}" \
          CFLAGS="-Os -fno-pie" \
          LDFLAGS="-static -no-pie" \
          CPPFLAGS="-DDROPBEAR_X11FWD" \
          ./configure \
            --host="${TARGET}" \
            --disable-pam \
            --disable-zlib \
            --enable-bundled-libtom \
            --enable-static

          echo "Building dropbear…"
          make -j "${JOBS}" PROGRAMS="dropbear dbclient dropbearkey dropbearconvert scp" STATIC=1

          [[ -x ./dropbear ]] || { echo "Build failed: dropbear missing"; exit 1; }
          strip ./drop* dbclient scp || true

          # ---- Package -----------------------------------------------------
          stage_dir="${builddir}/stage/dropbear-${TARGET}"
          mkdir -p "${stage_dir}"
          cp ./dropbear* dbclient scp "${stage_dir}/"

          out_tar="${workdir}/dropbear-${TARGET}.tar.xz"
          echo "Creating ${out_tar}…"
          tar -C "${builddir}/stage" -cJf "${out_tar}" "dropbear-${TARGET}"

          sha256sum "${out_tar}" | tee "${out_tar}.SHA256"
          echo "Done: ${out_tar}"

      - name: Upload dropbear artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ matrix.target }}
          overwrite: true
          path: |
            dropbear-${{ matrix.target }}.tar.xz
            dropbear-${{ matrix.target }}.tar.xz.SHA256

  release:
    name: create github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -lR dist

      - name: Create / Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/**/dropbear-*.tar.xz
            dist/**/dropbear-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}