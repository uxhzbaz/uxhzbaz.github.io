name: Build Dropbear
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  push:
    tags: ["dropbear-*"]
  workflow_dispatch:
    inputs:
      run_name:
        description: '工作流运行名称'
        default: ''
        required: false
      source_url:
        description: 'Dropbear 源码包URL'
        default: 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz'
        required: true
      targets:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi'
        required: true
      publish_release:
        description: '发布到 Release (true/false)'
        default: 'false'
        required: false

permissions:
  contents: write

env:
  JOBS: 8
  ZIG_VERSION: '0.16.0'

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      first_key: ${{ steps.p.outputs.first_key }}
      source_url: ${{ steps.p.outputs.source_url }}
      dropbear_version: ${{ steps.p.outputs.dropbear_version }}
      do_release: ${{ steps.p.outputs.do_release }}
    steps:
      - id: p
        name: 解析参数
        shell: bash
        env:
          TARGETS: ${{ github.event.inputs.targets || 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi' }}
          SOURCE_URL: ${{ github.event.inputs.source_url || 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz' }}
          PUBLISH: ${{ github.event.inputs.publish_release || 'false' }}
        run: |
          include='[]'
          first_key=''

          # 从 URL 提取版本号
          url="$SOURCE_URL"
          ver="${url##*/DROPBEAR_}"
          ver="${ver%.tar.gz}"; ver="${ver%.tar.xz}"; ver="${ver%.tgz}"
          echo "dropbear_version=$ver" >> $GITHUB_OUTPUT
          echo "source_url=$SOURCE_URL" >> $GITHUB_OUTPUT

          IFS=',' read -ra TS <<< "$TARGETS"
          for t in "${TS[@]}"; do
            t="${t# }"; t="${t% }"
            case "$t" in
              i686-*)   zig_target="x86-${t#i686-}"  ;;
              *)        zig_target="$t"               ;;
            esac
            case "$t" in
              *aarch64*) runner="ubuntu-24.04-arm" ; zig_arch="aarch64" ;;
              *)         runner="ubuntu-latest"    ; zig_arch="x86_64"  ;;
            esac
            include=$(jq \
              --arg t "$t" --arg zig_target "$zig_target" \
              --arg runner "$runner" --arg zig_arch "$zig_arch" \
              '. += [{"t":$t,"zig_target":$zig_target,"runner":$runner,"zig_arch":$zig_arch}]' \
              <<< "$include")
            [[ -z "$first_key" ]] && first_key="$t"
          done

          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT
          echo "first_key=$first_key" >> $GITHUB_OUTPUT

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "do_release=true" >> $GITHUB_OUTPUT
          else
            echo "do_release=$PUBLISH" >> $GITHUB_OUTPUT
          fi

  build:
    needs: s
    name: ${{ matrix.t }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    steps:
      - name: 安装构建依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: autoconf automake make
          version: 1.0

      - name: 缓存 Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/zig
          key: zig-${{ matrix.zig_arch }}-${{ env.ZIG_VERSION }}

      - name: 下载 Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          # 0.14.1+ 格式: zig-{arch}-{os}-{version}.tar.xz
          ZIG_URL="https://ziglang.org/download/${ZIG_VERSION}/zig-${{ matrix.zig_arch }}-linux-${ZIG_VERSION}.tar.xz"
          echo "Downloading Zig from $ZIG_URL"
          curl -fsSL --retry 3 --retry-delay 5 "$ZIG_URL" -o zig.tar.xz
          mkdir -p "${{ github.workspace }}/zig"
          tar -xJf zig.tar.xz -C "${{ github.workspace }}/zig" --strip-components=1
          "${{ github.workspace }}/zig/zig" version

      - name: 构建 dropbearmulti
        env:
          TARGET: ${{ matrix.t }}
          ZIG_TARGET: ${{ matrix.zig_target }}
          SOURCE_URL: ${{ needs.s.outputs.source_url }}
          DROPBEAR_VERSION: ${{ needs.s.outputs.dropbear_version }}
        run: |
          set -ev
          workdir="$(pwd)"
          ZIG_BIN="${{ github.workspace }}/zig/zig"
          export PATH="${{ github.workspace }}/zig:$PATH"
          echo "Zig $("$ZIG_BIN" version) | $TARGET (zig: $ZIG_TARGET)"

          EXT="${SOURCE_URL##*.}"
          curl -fsSL --retry 3 --retry-delay 5 "$SOURCE_URL" -o "src.tar.${EXT}"
          mkdir -p src
          tar -xf "src.tar.${EXT}" -C src --strip-components=1
          cd src

          autoconf
          autoheader

          CC="${ZIG_BIN} cc -target ${ZIG_TARGET}" \
          CFLAGS="-Os -fno-pie" \
          LDFLAGS="-static -no-pie" \
          CPPFLAGS="-DDROPBEAR_X11FWD" \
          ./configure \
            --host="${TARGET}" \
            --disable-pam \
            --disable-zlib \
            --enable-bundled-libtom \
            --enable-static

          # 先 make clean 再 MULTI=1 编译（文档要求）
          make clean
          make -j"${JOBS}" \
            PROGRAMS="dropbear dbclient dropbearkey dropbearconvert scp" \
            STATIC=1 \
            MULTI=1

          [[ -x ./dropbearmulti ]] || { echo "::error::编译失败: dropbearmulti 不存在"; exit 1; }

          strip ./dropbearmulti 2>/dev/null || true

          # 收集产物
          mkdir -p "${workdir}/dist"
          cp ./dropbearmulti "${workdir}/dist/dropbearmulti"

          # 建立符号链接
          cd "${workdir}/dist"
          for tool in dropbear dbclient dropbearkey dropbearconvert scp; do
            ln -sf dropbearmulti "$tool"
          done

      - name: 验证静态链接
        run: |
          file dist/dropbearmulti
          file dist/dropbearmulti | grep -q "statically linked" || \
            { echo "::error::dropbearmulti 未静态链接"; exit 1; }

      - name: 生成摘要
        env:
          TARGET: ${{ matrix.t }}
          DROPBEAR_VERSION: ${{ needs.s.outputs.dropbear_version }}
          IS_FIRST: ${{ matrix.t == needs.s.outputs.first_key }}
        run: |
          f="dist/dropbearmulti"
          B_SIZE=$(ls -lh "$f" | awk '{print $5}')
          B_S256=$(sha256sum "$f" | awk '{print $1}')
          B_S512=$(sha512sum "$f" | awk '{print $1}')
          {
            echo "## \`dropbear-${DROPBEAR_VERSION}-${TARGET}\`"
            echo ""
            echo "### 🔧 二进制可执行文件校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            echo "| \`dropbearmulti\` | ${B_SIZE} | \`${B_S256}\` | \`${B_S512}\` |"
            echo ""
            echo "### 🔗 包含的工具（符号链接到 dropbearmulti）"
            echo "\`dropbear\` \`dbclient\` \`dropbearkey\` \`dropbearconvert\` \`scp\`"
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_FIRST" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 工具帮助信息" >> $GITHUB_STEP_SUMMARY
            for tool in dropbear dbclient dropbearkey dropbearconvert; do
              HELP=$(dist/dropbearmulti $tool --help 2>&1 || true)
              {
                echo "<details><summary><code>dropbearmulti $tool --help</code></summary>"
                echo ""
                echo '```'
                echo "$HELP"
                echo '```'
                echo "</details>"
              } >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: 打包
        env:
          TARGET: ${{ matrix.t }}
          DROPBEAR_VERSION: ${{ needs.s.outputs.dropbear_version }}
        run: |
          PKG="dropbear-${DROPBEAR_VERSION}-${TARGET}.tar.xz"
          tar -cJf "$PKG" -C dist .
          sha256sum "$PKG" | tee "${PKG}.SHA256"
          echo "打包: $PKG ($(ls -lh "$PKG" | awk '{print $5}'))"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ needs.s.outputs.dropbear_version }}-${{ matrix.t }}
          path: |
            dropbear-${{ needs.s.outputs.dropbear_version }}-${{ matrix.t }}.tar.xz
            dropbear-${{ needs.s.outputs.dropbear_version }}-${{ matrix.t }}.tar.xz.SHA256

  release:
    name: 发布 Release
    needs: [s, build]
    runs-on: ubuntu-latest
    if: needs.s.outputs.do_release == 'true'
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: dropbear-${{ needs.s.outputs.dropbear_version }}
          files: |
            dist/**/*.tar.xz
            dist/**/*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}