name: Build Dropbear

on:
  workflow_dispatch:
    inputs:
      src_url:
        description: 'Source tarball URL (e.g. dropbear)'
        default: 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz'
        required: true
      targets:
        description: 'Comma-separated target triples'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare matrix
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.parse.outputs.targets }}
    steps:
      - id: parse
        shell: bash
        env:
          T: ${{ github.event.inputs.targets }}
        run: |
          targets='['; IFS=','; for t in $T; do
            t=${t# }; t=${t% }
            targets+="\"$t\","
          done; targets="${targets%,}]"
          echo "targets=$targets" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ (contains(matrix.target, 'arm') || contains(matrix.target, 'aarch64')) && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    env:
      ZIG_VERSION: 0.15.1
      JOBS: 8
    steps:
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates tar xz-utils autoconf automake make gcc g++ cmake ninja-build

      - name: Build statically with Zig + musl
        env:
          SRC_URL: ${{ github.event.inputs.src_url }}
          TARGET: ${{ matrix.target }}
        run: |
          set -ev

          workdir="$(pwd)"
          builddir="$(mktemp -d)"
          trap 'rm -rf "$builddir"' EXIT

          # ---- Download Zig -------------------------------------------------
          zig_arch=$(uname -m)
          zig_pkg="zig-${zig_arch}-linux-${ZIG_VERSION}.tar.xz"
          zig_url="https://ziglang.org/download/${ZIG_VERSION}/${zig_pkg}"
          echo "Downloading Zig ${ZIG_VERSION}..."
          curl -fsSL "$zig_url" -o "${builddir}/${zig_pkg}"
          tar -C "$builddir" -xJf "${builddir}/${zig_pkg}"
          zig_root=$(tar -tf "${builddir}/${zig_pkg}" | head -1 | cut -d/ -f1)
          ZIG_BIN="${builddir}/${zig_root}/zig"
          export PATH="${builddir}/${zig_root}:$PATH"
          "${ZIG_BIN}" version

          # ---- Download source ----------------------------------------------
          echo "Downloading source from $SRC_URL"
          src_tar="${builddir}/source.tar.gz"
          curl -fsSL "$SRC_URL" -o "$src_tar"
          echo "Extracting source..."
          tar -C "$builddir" -xzf "$src_tar"
          src_dir=$(tar -tzf "$src_tar" | head -1 | cut -d/ -f1)
          cd "${builddir}/${src_dir}"

          # ---- Build (static, musl) ----------------------------------------
          echo "Configuring for ${TARGET}…"
          CC="${ZIG_BIN} cc -target ${TARGET}" \
          CFLAGS="-Os -fno-pie" \
          LDFLAGS="-static -no-pie" \
          CPPFLAGS="-DDROPBEAR_X11FWD" \
          ./configure \
            --host="${TARGET}" \
            --disable-pam \
            --disable-zlib \
            --enable-bundled-libtom \
            --enable-static

          echo "Building dropbear…"
          make -j "${JOBS}" PROGRAMS="dropbear dbclient dropbearkey dropbearconvert scp" STATIC=1

          [[ -x ./dropbear ]] || { echo "Build failed: dropbear missing"; exit 1; }
          strip ./drop* dbclient scp || true

          # ---- Package -----------------------------------------------------
          stage_dir="${builddir}/stage/dropbear-${TARGET}"
          mkdir -p "${stage_dir}"
          cp ./dropbear* dbclient scp "${stage_dir}/"

          out_tar="${workdir}/dropbear-${TARGET}.tar.xz"
          echo "Creating ${out_tar}…"
          tar -C "${builddir}/stage" -cJf "${out_tar}" "dropbear-${TARGET}"

          sha256sum "${out_tar}" | tee "${out_tar}.SHA256"
          echo "Done: ${out_tar}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ matrix.target }}
          overwrite: true
          path: |
            dropbear-${{ matrix.target }}.tar.xz
            dropbear-${{ matrix.target }}.tar.xz.SHA256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: ls -lR dist

      - name: Create / Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/**/dropbear-*.tar.xz
            dist/**/dropbear-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}