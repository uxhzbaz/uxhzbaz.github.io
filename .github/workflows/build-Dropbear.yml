name: Build Dropbear
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      run_name:
        description: '工作流运行名称'
        default: ''
        required: false
      source_url:
        description: 'Dropbear 源码包URL'
        default: 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz'
        required: true
      targets:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
        required: true

permissions:
  contents: write

env:
  JOBS: 8

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      first_key: ${{ steps.p.outputs.first_key }}
      source_url: ${{ steps.p.outputs.source_url }}
      zig_x86_64_url: ${{ steps.zig.outputs.zig_x86_64_url }}
      zig_aarch64_url: ${{ steps.zig.outputs.zig_aarch64_url }}
      zig_version: ${{ steps.zig.outputs.zig_version }}
    steps:
      - id: zig
        name: 获取 Zig 最新 dev URL
        run: |
          index=$(curl -fsSL https://ziglang.org/download/index.json)
          x86_url=$(echo "$index" | jq -r '.master["x86_64-linux"].tarball')
          arm_url=$(echo "$index" | jq -r '.master["aarch64-linux"].tarball')
          ver=$(echo "$index" | jq -r '.master.version')
          echo "zig_x86_64_url=$x86_url" >> $GITHUB_OUTPUT
          echo "zig_aarch64_url=$arm_url" >> $GITHUB_OUTPUT
          echo "zig_version=$ver" >> $GITHUB_OUTPUT
          echo "x86_64: $x86_url"
          echo "aarch64: $arm_url"
          echo "version: $ver"

      - id: p
        name: 解析三元组
        shell: bash
        env:
          TARGETS: ${{ github.event.inputs.targets || 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi' }}
          SOURCE_URL: ${{ github.event.inputs.source_url || 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz' }}
        run: |
          include='[]'
          first_key=''
          IFS=',' read -ra TS <<< "$TARGETS"
          for t in "${TS[@]}"; do
            t="${t# }"; t="${t% }"
            case "$t" in
              *aarch64*) runner="ubuntu-24.04-arm" ; zig_arch="aarch64" ;;
              *)         runner="ubuntu-latest"    ; zig_arch="x86_64"  ;;
            esac
            include=$(jq \
              --arg t "$t" --arg runner "$runner" --arg zig_arch "$zig_arch" \
              '. += [{"t":$t,"runner":$runner,"zig_arch":$zig_arch}]' \
              <<< "$include")
            [[ -z "$first_key" ]] && first_key="$t"
          done
          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT
          echo "first_key=$first_key" >> $GITHUB_OUTPUT
          echo "source_url=$SOURCE_URL" >> $GITHUB_OUTPUT

  build:
    needs: s
    name: ${{ matrix.t }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    steps:
      - name: 安装构建依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: autoconf automake make
          version: 1.0

      - name: 设置 Zig URL
        id: zig_url
        run: |
          if [[ "${{ matrix.zig_arch }}" == "aarch64" ]]; then
            echo "url=${{ needs.s.outputs.zig_aarch64_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ needs.s.outputs.zig_x86_64_url }}" >> $GITHUB_OUTPUT
          fi

      - name: 缓存 Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/zig
          key: zig-${{ matrix.zig_arch }}-${{ needs.s.outputs.zig_version }}

      - name: 下载 Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          ZIG_URL="${{ steps.zig_url.outputs.url }}"
          echo "Downloading Zig from $ZIG_URL"
          curl -fsSL --retry 3 --retry-delay 5 "$ZIG_URL" -o zig.tar.xz
          mkdir -p "${{ github.workspace }}/zig"
          tar -xJf zig.tar.xz -C "${{ github.workspace }}/zig" --strip-components=1
          "${{ github.workspace }}/zig/zig" version

      - name: 下载并解压源码
        run: |
          SOURCE_URL="${{ needs.s.outputs.source_url }}"
          EXT="${SOURCE_URL##*.}"
          curl -fsSL --retry 3 --retry-delay 5 "$SOURCE_URL" -o "src.tar.${EXT}"
          mkdir -p src
          tar -xf "src.tar.${EXT}" -C src --strip-components=1

      - name: 编译
        env:
          TARGET: ${{ matrix.t }}
        run: |
          ZIG_BIN="${{ github.workspace }}/zig/zig"
          echo "Zig $("$ZIG_BIN" version) -> $TARGET"

          WRAPPERS="${{ github.workspace }}/wrappers"
          mkdir -p "$WRAPPERS"

          printf '#!/bin/sh\nexec "%s" cc -target %s "$@"\n' "$ZIG_BIN" "$TARGET" > "$WRAPPERS/${TARGET}-gcc"
          printf '#!/bin/sh\nexec "%s" c++ -target %s "$@"\n' "$ZIG_BIN" "$TARGET" > "$WRAPPERS/${TARGET}-g++"
          printf '#!/bin/sh\nexec "%s" ar "$@"\n' "$ZIG_BIN" > "$WRAPPERS/${TARGET}-ar"
          chmod +x "$WRAPPERS/${TARGET}-gcc" "$WRAPPERS/${TARGET}-g++" "$WRAPPERS/${TARGET}-ar"
          export PATH="$WRAPPERS:$PATH"

          cd src
          autoconf 2>/dev/null || true
          autoheader 2>/dev/null || true

          CC="${TARGET}-gcc" \
          CXX="${TARGET}-g++" \
          AR="${TARGET}-ar" \
          CFLAGS="-Os -fno-pie" \
          LDFLAGS="-static -no-pie" \
          CPPFLAGS="-DDROPBEAR_X11FWD" \
          ./configure \
            --host="${TARGET}" \
            --disable-pam \
            --disable-zlib \
            --enable-bundled-libtom \
            --enable-static

          make -j"${JOBS}" \
            PROGRAMS="dropbear dbclient dropbearkey dropbearconvert scp" \
            STATIC=1

          [[ -x ./dropbear ]] || { echo "::error::编译失败"; exit 1; }

          for bin in dropbear dbclient dropbearkey dropbearconvert scp; do
            [[ -f "./$bin" ]] && "$ZIG_BIN" objcopy --strip-all "./$bin" 2>/dev/null || true
          done

      - name: 收集产物
        env:
          TARGET: ${{ matrix.t }}
        run: |
          mkdir -p dist
          for bin in dropbear dbclient dropbearkey dropbearconvert scp; do
            [[ -x "src/$bin" ]] && cp "src/$bin" "dist/$bin"
          done
          echo "产物:"; ls -lh dist/

      - name: 验证静态链接
        run: |
          fail=0
          for f in dist/*; do
            file "$f"
            file "$f" | grep -q "statically linked" || { echo "::error::$f 未静态链接"; fail=1; }
          done
          [[ $fail -eq 0 ]] || exit 1

      - name: 生成摘要
        env:
          TARGET: ${{ matrix.t }}
          IS_FIRST: ${{ matrix.t == needs.s.outputs.first_key }}
        run: |
          {
            echo "## \`${TARGET}\`"
            echo ""
            echo "### 🔧 二进制可执行文件校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            for f in dist/*; do
              fname=$(basename "$f")
              B_SIZE=$(ls -lh "$f" | awk '{print $5}')
              B_S256=$(sha256sum "$f" | awk '{print $1}')
              B_S512=$(sha512sum "$f" | awk '{print $1}')
              echo "| \`${fname}\` | ${B_SIZE} | \`${B_S256}\` | \`${B_S512}\` |"
            done
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_FIRST" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 工具帮助信息" >> $GITHUB_STEP_SUMMARY
            for f in dist/*; do
              fname=$(basename "$f")
              HELP=$("$f" --help 2>&1 || true)
              {
                echo "<details><summary><code>${fname} --help</code></summary>"
                echo ""
                echo '```'
                echo "$HELP"
                echo '```'
                echo "</details>"
              } >> $GITHUB_STEP_SUMMARY
            done
          fi

      - name: 打包
        env:
          TARGET: ${{ matrix.t }}
        run: |
          tar -cJf "dropbear-${TARGET}.tar.xz" -C dist .
          sha256sum "dropbear-${TARGET}.tar.xz" | tee "dropbear-${TARGET}.tar.xz.SHA256"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ matrix.t }}
          path: |
            dropbear-${{ matrix.t }}.tar.xz
            dropbear-${{ matrix.t }}.tar.xz.SHA256

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/**/dropbear-*.tar.xz
            dist/**/dropbear-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}