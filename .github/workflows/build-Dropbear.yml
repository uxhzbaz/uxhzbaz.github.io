name: Build Dropbear
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      source_url:
        description: 'Dropbear source tar.gz URL'
        default: 'https://github.com/mkj/dropbear/archive/refs/tags/DROPBEAR_2026.91.tar.gz'
        required: true
      targets:
        description: 'Comma-separated target triples'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabi'
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.parse.outputs.targets }}
      source_url: ${{ steps.parse.outputs.source_url }}
    steps:
      - id: parse
        run: |
          IFS=',' read -ra T <<< "${{ github.event.inputs.targets }}"
          JSON="["
          for t in "${T[@]}"; do
            t="${t#"${t%%[![:space:]]*}"}"  # trim leading spaces
            t="${t%"${t##*[![:space:]]}"}"  # trim trailing spaces
            JSON+="\"$t\","
          done
          JSON="${JSON%,}]"
          echo "targets=${JSON}" >> "$GITHUB_OUTPUT"
          echo "source_url=${{ github.event.inputs.source_url }}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: 0.15.1
      JOBS: 8
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates tar xz-utils autoconf automake make gcc g++ cmake ninja-build

      - name: Build static dropbear (musl)
        env:
          TARGET: ${{ matrix.target }}
          SOURCE_URL: ${{ needs.prepare.outputs.source_url }}
        run: |
          set -e
          workdir="$(pwd)"
          builddir="$(mktemp -d)"
          trap 'rm -rf "$builddir"' EXIT

          # ---- Download Zig -------------------------------------------------
          zig_arch="$(uname -m)"
          zig_pkg="zig-${zig_arch}-linux-${ZIG_VERSION}.tar.xz"
          zig_url="https://ziglang.org/download/${ZIG_VERSION}/${zig_pkg}"
          echo "Downloading Zig ${ZIG_VERSION}..."
          curl -fsSL "$zig_url" -o "${builddir}/${zig_pkg}"
          tar -C "$builddir" -xJf "${builddir}/${zig_pkg}"
          zig_root="$(tar -tf "${builddir}/${zig_pkg}" | head -1 | cut -d/ -f1)"
          ZIG_BIN="${builddir}/${zig_root}/zig"
          export PATH="${builddir}/${zig_root}:$PATH"
          "$ZIG_BIN" version

          # ---- Download & extract source ------------------------------------
          src_tar="${builddir}/dropbear-src.tar.gz"
          echo "Downloading source from $SOURCE_URL ..."
          curl -fsSL "$SOURCE_URL" -o "$src_tar"
          mkdir "${builddir}/src"
          tar -xzf "$src_tar" -C "${builddir}/src"
          cd "${builddir}/src"
          shopt -s nullglob
          dirs=(*/)
          if [ ${#dirs[@]} -eq 1 ]; then
            cd "${dirs[0]}"
          fi

          # ---- Build --------------------------------------------------------
          echo "Configuring for ${TARGET}…"
          CC="${ZIG_BIN} cc -target ${TARGET}" \
          CFLAGS="-Os -fno-pie" \
          LDFLAGS="-static -no-pie" \
          CPPFLAGS="-DDROPBEAR_X11FWD" \
          ./configure \
            --host="${TARGET}" \
            --disable-pam \
            --disable-zlib \
            --enable-bundled-libtom \
            --enable-static

          echo "Building…"
          make -j "${JOBS}" PROGRAMS="dropbear dbclient dropbearkey dropbearconvert scp" STATIC=1

          [ -x ./dropbear ] || { echo "dropbear not found!"; exit 1; }
          strip ./drop* dbclient scp || true

          # ---- Package ------------------------------------------------------
          stage="${builddir}/stage/dropbear-${TARGET}"
          mkdir -p "$stage"
          cp ./dropbear* dbclient scp "$stage/"
          out="${workdir}/dropbear-${TARGET}.tar.xz"
          tar -C "${builddir}/stage" -cJf "$out" "dropbear-${TARGET}"
          sha256sum "$out" | tee "${out}.SHA256"
          echo "Built: $out"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dropbear-${{ matrix.target }}
          overwrite: true
          path: |
            dropbear-${{ matrix.target }}.tar.xz
            dropbear-${{ matrix.target }}.tar.xz.SHA256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            dist/**/dropbear-*.tar.xz
            dist/**/dropbear-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}