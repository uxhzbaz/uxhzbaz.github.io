name: Build tgt
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  workflow_dispatch:
    inputs:
      run_name:
        description: '工作流运行名称'
        default: ''
        required: false
      t:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,i686-unknown-linux-musl,arm-unknown-linux-musleabihf'
      extra_args:
        description: '附加 cargo 参数（如 --no-default-features）'
        default: ''
        required: false
      upx:
        description: 'UPX 压缩 (true/false)'
        default: 'true'
        required: false

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
    steps:
      - id: p
        shell: bash
        env:
          T: ${{ github.event.inputs.t }}
        run: |
          include='[]'
          IFS=',' read -ra TARGETS <<< "$T"
          for t in "${TARGETS[@]}"; do
            t="${t# }"; t="${t% }"
            include=$(jq --arg t "$t" '. += [{"t":$t}]' <<< "$include")
          done
          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT

  b:
    needs: s
    name: tgt-v1.0.0-rc1-${{ matrix.t }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    env:
      PKG: tgt
      VERSION: v1.0.0-rc1
      URL: https://github.com/FedericoBruzzone/tgt/archive/refs/tags/v1.0.0-rc1.tar.gz
      ZIG_VERSION: 0.16.0
    steps:
      - name: 安装系统依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: upx-ucl libasound2-dev
          version: 1.0

      - name: 安装 Zig ${{ env.ZIG_VERSION }}
        run: |
          curl -sL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" \
            | tar -xJ -C "$HOME"
          echo "$HOME/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: 缓存 cargo-zigbuild
        id: cache-zigbuild
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-zigbuild
          key: cargo-zigbuild-${{ runner.os }}

      - name: 安装 cargo-zigbuild
        if: steps.cache-zigbuild.outputs.cache-hit != 'true'
        run: cargo install cargo-zigbuild --locked

      - name: 添加 Rust 目标
        run: rustup target add ${{ matrix.t }}

      - name: 下载并解压源码
        run: |
          curl -sL "$URL" | tar -xz --strip-components=1
          grep -q '^strip *=' Cargo.toml \
            && perl -pi -e 's/^strip *=.*/strip = true/' Cargo.toml \
            || (grep -q '^\[profile\.release\]' Cargo.toml \
              && perl -pi -e 's/^\[profile\.release\].*/$&\nstrip = true/' Cargo.toml \
              || printf '\n[profile.release]\nstrip = true\n' >> Cargo.toml)

      - name: 编译
        run: |
          # 获取用户输入的附加参数
          ARGS="${{ github.event.inputs.extra_args }}"
          
          # 如果目标三元组包含 musl，且用户没有手动输入参数，
          # 则自动剔除带 alsa/audiopus 依赖的音频特性，只保留核心静态打包特性
          if [[ "${{ matrix.t }}" == *musl* && -z "$ARGS" ]]; then
            ARGS="--no-default-features --features static-download"
          fi
          
          echo "正在编译目标 ${{ matrix.t }}，附加参数: $ARGS"
          
          # 使用 cargo-zigbuild 进行交叉编译（移除了会导致 panic 的 ALSA 环境变量）
          cargo zigbuild --release --locked \
            --target ${{ matrix.t }} \
            $ARGS

      - name: UPX 压缩
        if: ${{ github.event.inputs.upx != 'false' }}
        run: |
          upx --best --lzma "target/${{ matrix.t }}/release/${PKG}" \
            && echo "UPX 压缩成功" \
            || echo "::warning::UPX 压缩失败（已跳过）"

      - name: 生成摘要并打包
        run: |
          AB="${PKG}-${VERSION}-${{ matrix.t }}"
          BIN="target/${{ matrix.t }}/release/${PKG}"
          B_S256=$(sha256sum "$BIN" | awk '{print $1}')
          B_S512=$(sha512sum "$BIN" | awk '{print $1}')
          B_SIZE=$(ls -lh "$BIN" | awk '{print $5}')
          cp "$BIN" "./${AB}"
          {
            echo "## \`${AB}\`"
            echo ""
            echo "### 🔧 二进制校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            echo "| \`${PKG}\` | ${B_SIZE} | \`${B_S256}\` | \`${B_S512}\` |"
          } >> $GITHUB_STEP_SUMMARY

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: tgt-v1.0.0-rc1-${{ matrix.t }}
          path: ./tgt-v1.0.0-rc1-${{ matrix.t }}
