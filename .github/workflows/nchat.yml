name: nchat v5.15.26 · aarch64-unknown-linux-musl

on:
  workflow_dispatch:

env:
  NCHAT_VERSION: '5.15.26'
  TC: aarch64-unknown-linux-musl
  TOOLCHAIN_BASE: 'https://github.com/cross-tools/musl-cross/releases/download/20260430'
  TOOLCHAIN_TAG: '20260430'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 安装宿主构建工具
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake gperf help2man ccache \
            autoconf automake libtool pkg-config \
            curl file unzip gettext \
            build-essential python3

      - name: 配置 Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: false   # 无 go.sum，禁用模块缓存避免警告

      - name: 缓存工具链
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain
          key: musl-tc-${{ env.TC }}-${{ env.TOOLCHAIN_TAG }}

      - name: 下载并解压工具链
        if: steps.cache-tc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "${TOOLCHAIN_BASE}/${TC}.tar.xz" \
            -o tc.tar.xz
          mkdir -p "${{ github.workspace }}/toolchain"
          tar -xf tc.tar.xz -C "${{ github.workspace }}/toolchain" --strip-components=1
          rm tc.tar.xz

      - name: 配置 ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: nchat-ccache-${{ env.TC }}-${{ github.sha }}
          restore-keys: nchat-ccache-${{ env.TC }}-

      - name: 下载 nchat 源码
        run: |
          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://github.com/d99kris/nchat/archive/refs/tags/v${NCHAT_VERSION}.tar.gz" \
            -o nchat.tar.gz
          tar -xzf nchat.tar.gz
          mv "nchat-${NCHAT_VERSION}" nchat
          rm nchat.tar.gz

      # ── 先把所有依赖源码包一次性下载完，方便定位网络错误 ──────────────────
      - name: 下载所有依赖源码
        run: |
          mkdir -p "${{ github.workspace }}/srcs"
          cd "${{ github.workspace }}/srcs"

          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://zlib.net/zlib-1.3.1.tar.gz" \
            -o zlib.tar.gz

          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://www.openssl.org/source/openssl-3.3.2.tar.gz" \
            -o openssl.tar.gz

          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://ftp.gnu.org/gnu/ncurses/ncurses-6.5.tar.gz" \
            -o ncurses.tar.gz

          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://ftp.gnu.org/gnu/readline/readline-8.2.tar.gz" \
            -o readline.tar.gz

          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://www.sqlite.org/2024/sqlite-autoconf-3470200.tar.gz" \
            -o sqlite3.tar.gz

          curl -fsSL --retry 5 --retry-delay 10 --retry-all-errors \
            "https://astron.com/pub/file/file-5.45.tar.gz" \
            -o libmagic.tar.gz

          echo "全部下载完成，文件列表:"
          ls -lh

      - name: 编译静态依赖
        run: |
          set -euo pipefail

          TCBIN="${{ github.workspace }}/toolchain/bin"
          SYSROOT="${{ github.workspace }}/sysroot"
          SRCS="${{ github.workspace }}/srcs"

          export PATH="${TCBIN}:${PATH}"
          export CC="${TC}-gcc"
          export CXX="${TC}-g++"
          export AR="${TC}-ar"
          export RANLIB="${TC}-ranlib"
          export CFLAGS="-Os -fPIC"
          export CXXFLAGS="-Os -fPIC"
          export CPPFLAGS="-I${SYSROOT}/include"
          export LDFLAGS="-L${SYSROOT}/lib"

          mkdir -p "${SYSROOT}" deps && cd deps

          # ── zlib ────────────────────────────────────────────────────────
          echo ">>> 构建 zlib"
          tar -xzf "${SRCS}/zlib.tar.gz"
          pushd zlib-1.3.1
          CHOST="${TC}" ./configure \
            --prefix="${SYSROOT}" \
            --static
          make -j$(nproc)
          make install
          popd

          # ── OpenSSL ─────────────────────────────────────────────────────
          echo ">>> 构建 OpenSSL"
          tar -xzf "${SRCS}/openssl.tar.gz"
          pushd openssl-3.3.2
          ./Configure linux-aarch64 \
            --prefix="${SYSROOT}" \
            --cross-compile-prefix="${TC}-" \
            no-shared no-tests no-ui-console \
            -static
          make -j$(nproc)
          make install_sw
          popd

          # ── ncurses (wide-char) ─────────────────────────────────────────
          echo ">>> 构建 ncurses"
          tar -xzf "${SRCS}/ncurses.tar.gz"
          pushd ncurses-6.5
          ./configure \
            --host="${TC}" \
            --prefix="${SYSROOT}" \
            --without-shared \
            --with-static \
            --without-debug \
            --enable-widec \
            --without-tests \
            --without-progs \
            --with-default-terminfo-dir=/usr/share/terminfo \
            --with-terminfo-dirs=/usr/share/terminfo:/lib/terminfo
          make -j$(nproc)
          make install
          # 为不带 w 后缀的消费方提供兼容软链
          for lib in ncurses form panel menu tinfo; do
            src="${SYSROOT}/lib/lib${lib}w.a"
            dst="${SYSROOT}/lib/lib${lib}.a"
            [ -f "${src}" ] && [ ! -f "${dst}" ] && ln -s "${src}" "${dst}" || true
          done
          popd

          # ── readline ────────────────────────────────────────────────────
          echo ">>> 构建 readline"
          tar -xzf "${SRCS}/readline.tar.gz"
          pushd readline-8.2
          ./configure \
            --host="${TC}" \
            --prefix="${SYSROOT}" \
            --disable-shared \
            --enable-static \
            --with-curses \
            CPPFLAGS="-I${SYSROOT}/include -I${SYSROOT}/include/ncursesw"
          make -j$(nproc)
          make install
          popd

          # ── SQLite3 ─────────────────────────────────────────────────────
          echo ">>> 构建 SQLite3"
          tar -xzf "${SRCS}/sqlite3.tar.gz"
          pushd sqlite-autoconf-3470200
          ./configure \
            --host="${TC}" \
            --prefix="${SYSROOT}" \
            --disable-shared \
            --enable-static
          make -j$(nproc)
          make install
          popd

          # ── libmagic ────────────────────────────────────────────────────
          # file 构建时需要宿主端 file 可执行文件生成魔法数据库，
          # 因此先编译本机版本，再交叉编译 libmagic。
          echo ">>> 构建 libmagic"
          tar -xzf "${SRCS}/libmagic.tar.gz"
          pushd file-5.45
          (
            unset CC CXX AR RANLIB CFLAGS CXXFLAGS CPPFLAGS LDFLAGS
            mkdir build-host && cd build-host
            ../configure --disable-shared
            make -j$(nproc)
          )
          HOST_FILE="$(pwd)/build-host/src/file"
          mkdir build-cross && cd build-cross
          ../configure \
            --host="${TC}" \
            --prefix="${SYSROOT}" \
            --disable-shared \
            --enable-static \
            --disable-xzlib \
            --disable-bzlib \
            FILE_COMPILE="${HOST_FILE}"
          make -j$(nproc)
          make install
          popd

          echo ">>> 所有依赖构建完成"
          ls "${SYSROOT}/lib/"*.a

      - name: 生成 CMake 工具链文件
        run: |
          TCBIN="${{ github.workspace }}/toolchain/bin"
          SYSROOT="${{ github.workspace }}/sysroot"

          cat > "${{ github.workspace }}/musl.cmake" << CMAKEOF
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)

          set(CMAKE_C_COMPILER   ${TCBIN}/${TC}-gcc)
          set(CMAKE_CXX_COMPILER ${TCBIN}/${TC}-g++)
          set(CMAKE_AR           ${TCBIN}/${TC}-ar    CACHE FILEPATH "" FORCE)
          set(CMAKE_RANLIB       ${TCBIN}/${TC}-ranlib CACHE FILEPATH "" FORCE)
          set(CMAKE_STRIP        ${TCBIN}/${TC}-strip  CACHE FILEPATH "" FORCE)

          set(CMAKE_FIND_ROOT_PATH  "${SYSROOT}")
          set(CMAKE_PREFIX_PATH     "${SYSROOT}")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)

          set(CMAKE_EXE_LINKER_FLAGS    "-static -static-libstdc++ -static-libgcc" CACHE STRING "" FORCE)
          set(CMAKE_SHARED_LINKER_FLAGS ""                                          CACHE STRING "" FORCE)
          set(BUILD_SHARED_LIBS OFF CACHE BOOL "" FORCE)
          CMAKEOF

          sed -i 's/^          //' "${{ github.workspace }}/musl.cmake"
          echo "生成的工具链文件:"
          cat "${{ github.workspace }}/musl.cmake"

      - name: CMake 配置
        env:
          CCACHE_DIR: ~/.cache/ccache
          GOARCH: arm64
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          export PATH="${{ github.workspace }}/toolchain/bin:${PATH}"
          SYSROOT="${{ github.workspace }}/sysroot"
          INC="${SYSROOT}/include"
          LIB="${SYSROOT}/lib"

          cd nchat
          mkdir build && cd build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/musl.cmake" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_INSTALL_PREFIX=/usr \
            \
            -DOPENSSL_ROOT_DIR="${SYSROOT}" \
            -DOPENSSL_CRYPTO_LIBRARY="${LIB}/libcrypto.a" \
            -DOPENSSL_SSL_LIBRARY="${LIB}/libssl.a" \
            -DOPENSSL_USE_STATIC_LIBS=TRUE \
            \
            -DZLIB_ROOT="${SYSROOT}" \
            -DZLIB_LIBRARY="${LIB}/libz.a" \
            -DZLIB_INCLUDE_DIR="${INC}" \
            \
            -DREADLINE_LIBRARY="${LIB}/libreadline.a" \
            -DREADLINE_INCLUDE_DIR="${INC}/readline" \
            \
            -DCURSES_LIBRARY="${LIB}/libncursesw.a" \
            -DCURSES_INCLUDE_PATH="${INC}/ncursesw" \
            \
            -DSQLite3_INCLUDE_DIR="${INC}" \
            -DSQLite3_LIBRARY="${LIB}/libsqlite3.a" \
            \
            -DLibMagic_INCLUDE_DIR="${INC}" \
            -DLibMagic_LIBRARY="${LIB}/libmagic.a"

      - name: 编译
        env:
          CCACHE_DIR: ~/.cache/ccache
          GOARCH: arm64
          GOOS: linux
          CGO_ENABLED: '0'
        run: |
          cd nchat/build
          make -j$(nproc)

      - name: 安装 & 打包
        run: |
          STRIP="${{ github.workspace }}/toolchain/bin/${TC}-strip"
          DESTDIR="${{ github.workspace }}/pkg"
          PKG="nchat-${NCHAT_VERSION}-${TC}"

          cd nchat/build
          make install DESTDIR="${DESTDIR}"
          cd "${{ github.workspace }}"

          while IFS= read -r -d '' f; do
            file "$f" | grep -qE 'ELF.*executable' || continue
            "${STRIP}" --strip-all "$f" 2>/dev/null || true
          done < <(find "${DESTDIR}" -type f -print0)

          tar -cJf "${PKG}.tar.xz" -C "${DESTDIR}" .
          sha256sum "${PKG}.tar.xz" > "${PKG}.tar.xz.sha256"
          echo "产物: ${PKG}.tar.xz ($(du -sh "${PKG}.tar.xz" | cut -f1))"

      - name: 验证静态链接
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            file "$f" | grep -qE 'ELF.*executable' || continue
            if file "$f" | grep -q "statically linked"; then
              echo "OK: $(basename "$f")"
            else
              echo "::error::$(basename "$f") 未静态链接: $(file "$f")"
              fail=1
            fi
          done < <(find "${{ github.workspace }}/pkg" -type f -print0)
          [[ $fail -eq 0 ]] || exit 1

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: nchat-${{ env.NCHAT_VERSION }}-${{ env.TC }}
          path: |
            nchat-*.tar.xz
            nchat-*.tar.xz.sha256
