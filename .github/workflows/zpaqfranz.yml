name: build zpaqfranz

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'zpaqfranz 版本 (tag, commit, branch)'
        default: '64.7'
        required: false
      source_url:
        description: 'zpaqfranz.cpp 原始文件 URL'
        default: 'https://github.com/fcorbelli/zpaqfranz/raw/64.7/zpaqfranz.cpp'
        required: false
      targets:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi'
        required: false
      enable_sftp:
        description: '启用 SFTP 支持'
        default: 'yes'
        required: false
      extra_cxxflags:
        description: '额外的 C++ 编译标志'
        default: ''
        required: false

env:
  TOOLCHAIN_TAG: '20260515'
  TOOLCHAIN_BASE: 'https://github.com/cross-tools/musl-cross/releases/download/20260515'

jobs:
  prepare:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      first_key: ${{ steps.p.outputs.first_key }}
    steps:
      - id: p
        shell: bash
        env:
          TARGETS: ${{ github.event.inputs.targets }}
        run: |
          include='[]'
          first_key=''
          IFS=',' read -ra TS <<< "$TARGETS"
          for t in "${TS[@]}"; do
            t="${t# }"; t="${t% }"
            case "$t" in
              x86_64-linux-musl)            tc_triple="x86_64-unknown-linux-musl"    ;;
              aarch64-linux-musl)           tc_triple="aarch64-unknown-linux-musl"   ;;
              i686-linux-musl)              tc_triple="i686-unknown-linux-musl"      ;;
              arm-linux-musleabi)           tc_triple="arm-unknown-linux-musleabi"   ;;
              armv7-linux-musleabi)         tc_triple="armv7-unknown-linux-musleabi" ;;
              x86_64-unknown-linux-musl)    tc_triple="x86_64-unknown-linux-musl"    ;;
              aarch64-unknown-linux-musl)   tc_triple="aarch64-unknown-linux-musl"   ;;
              i686-unknown-linux-musl)      tc_triple="i686-unknown-linux-musl"      ;;
              arm-unknown-linux-musleabi)   tc_triple="arm-unknown-linux-musleabi"   ;;
              armv7-unknown-linux-musleabi) tc_triple="armv7-unknown-linux-musleabi" ;;
              *)
                echo "::warning::未知目标 $t，跳过"
                continue
                ;;
            esac
            tc_url="${TOOLCHAIN_BASE}/${tc_triple}.tar.xz"
            include=$(jq \
              --arg t "$t" --arg tc_triple "$tc_triple" --arg tc_url "$tc_url" \
              '. += [{"t":$t,"tc_triple":$tc_triple,"tc_url":$tc_url}]' \
              <<< "$include")
            [[ -z "$first_key" ]] && first_key="$t"
          done
          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT
          echo "first_key=$first_key" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    name: ${{ matrix.t }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: 安装构建依赖
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: autoconf automake libtool gettext
          version: 1.0

      - name: 缓存工具链
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain
          key: musl-toolchain-${{ matrix.tc_triple }}-${{ env.TOOLCHAIN_TAG }}

      - name: 下载并解压工具链
        if: steps.cache-tc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL --retry 3 --retry-delay 5 "${{ matrix.tc_url }}" -o toolchain.tar.xz
          mkdir -p "${{ github.workspace }}/toolchain"
          tar -xf toolchain.tar.xz -C "${{ github.workspace }}/toolchain" --strip-components=1

      - name: 设置环境变量
        id: env
        run: |
          TC="${{ matrix.tc_triple }}"
          PREFIX="${{ github.workspace }}/sysroot/usr"
          echo "TC=${TC}" >> $GITHUB_OUTPUT
          echo "PREFIX=${PREFIX}" >> $GITHUB_OUTPUT
          echo "PATH=${{ github.workspace }}/toolchain/bin:$PATH" >> $GITHUB_ENV
          echo "CC=${TC}-gcc" >> $GITHUB_ENV
          echo "CXX=${TC}-g++" >> $GITHUB_ENV
          echo "AR=${TC}-ar" >> $GITHUB_ENV
          echo "RANLIB=${TC}-ranlib" >> $GITHUB_ENV
          echo "STRIP=${TC}-strip" >> $GITHUB_ENV
          echo "CFLAGS=-O2 -fPIC" >> $GITHUB_ENV
          echo "CXXFLAGS=-O2 -fPIC" >> $GITHUB_ENV
          echo "LDFLAGS=-L${PREFIX}/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${PREFIX}/lib/pkgconfig" >> $GITHUB_ENV

      - name: 创建 sysroot 目录
        run: |
          mkdir -p "${{ steps.env.outputs.PREFIX }}"/{lib,include,bin}
          mkdir -p src

      # ========== SFTP = yes 时编译依赖库 ==========
      - name: 编译 zlib (条件：SFTP=yes)
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          cd src
          curl -fsSL https://zlib.net/zlib-1.3.2.tar.gz | tar xz
          cd zlib-1.3.2
          CC=$CC AR=$AR RANLIB=$RANLIB CFLAGS="$CFLAGS" \
            ./configure --prefix="${{ steps.env.outputs.PREFIX }}" --static
          make -j$(nproc)
          make install
          cd ../..

      - name: 编译 OpenSSL (条件：SFTP=yes)
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          cd src
          curl -fsSL https://www.openssl.org/source/openssl-3.5.0.tar.gz | tar xz
          cd openssl-3.5.0
          ./Configure linux-aarch64 \
            --prefix="${{ steps.env.outputs.PREFIX }}" \
            --openssldir="${{ steps.env.outputs.PREFIX }}/ssl" \
            no-shared no-tests CFLAGS="$CFLAGS"
          make -j$(nproc)
          make install_sw
          cd ../..

      - name: 编译 libssh2 (条件：SFTP=yes)
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          cd src
          curl -fsSL https://libssh2.org/download/libssh2-1.11.1.tar.gz | tar xz
          cd libssh2-1.11.1
          ./configure --host="${{ steps.env.outputs.TC }}" \
            --prefix="${{ steps.env.outputs.PREFIX }}" \
            CC=$CC AR=$AR RANLIB=$RANLIB \
            CFLAGS="$CFLAGS" \
            CPPFLAGS="-I${{ steps.env.outputs.PREFIX }}/include" \
            LDFLAGS="$LDFLAGS" \
            --disable-shared --enable-static \
            --with-crypto=openssl \
            --with-libssl-prefix="${{ steps.env.outputs.PREFIX }}" \
            --with-libz-prefix="${{ steps.env.outputs.PREFIX }}"
          make -j$(nproc)
          make install
          cd ../..

      - name: 编译 curl (条件：SFTP=yes)
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          cd src
          curl -fsSL https://curl.se/download/curl-8.13.0.tar.gz | tar xz
          cd curl-8.13.0
          ./configure --host="${{ steps.env.outputs.TC }}" \
            --prefix="${{ steps.env.outputs.PREFIX }}" \
            CC=$CC AR=$AR RANLIB=$RANLIB \
            CFLAGS="$CFLAGS" LDFLAGS="$LDFLAGS -static-libgcc" \
            --enable-shared --disable-static \
            --with-openssl="${{ steps.env.outputs.PREFIX }}" \
            --with-libssh2="${{ steps.env.outputs.PREFIX }}" \
            --with-zlib="${{ steps.env.outputs.PREFIX }}" \
            --without-libidn2 --without-nghttp2 --without-brotli --without-libpsl \
            --disable-ldap --disable-ldaps \
            --disable-dict --disable-gopher --disable-imap \
            --disable-mqtt --disable-pop3 --disable-rtsp \
            --disable-smb --disable-smtp --disable-telnet --disable-tftp
          make -j$(nproc)
          make install
          cd ../..

      # ========== 收集静态库 (仅 SFTP=yes) ==========
      - name: 收集静态库
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          PREFIX="${{ steps.env.outputs.PREFIX }}"
          mkdir -p static-libs
          cd static-libs
          for lib in libz.a libssl.a libcrypto.a libssh2.a; do
            if [ -f "$PREFIX/lib/$lib" ]; then
              cp "$PREFIX/lib/$lib" .
            else
              echo "警告: $PREFIX/lib/$lib 不存在，跳过"
            fi
          done
          ls -lh .
          cd ..

      - name: 打包静态库
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          TARGET="${{ matrix.t }}"
          tar -cJf "${TARGET}-static-libs.tar.xz" static-libs/

      # ========== 下载源码 ==========
      - name: 下载 zpaqfranz 源码
        run: |
          curl -fsSL "${{ github.event.inputs.source_url }}" -o zpaqfranz.cpp

      # ========== 编译 zpaqfranz ==========
      - name: 编译 zpaqfranz (SFTP=yes)
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          CXX="${{ env.CXX }}"
          PREFIX="${{ steps.env.outputs.PREFIX }}"
          $CXX -O3 -pthread -DNOJIT -DSFTP \
            -I"${PREFIX}/include" \
            -static-libgcc -static-libstdc++ \
            -L"${PREFIX}/lib" \
            -Wl,-rpath,'$ORIGIN' \
            zpaqfranz.cpp -o zpaqfranz \
            -lcurl -lssl -lcrypto -lssh2 -lz -lm -ldl \
            ${{ github.event.inputs.extra_cxxflags }}

      - name: 编译 zpaqfranz (SFTP=no)
        if: github.event.inputs.enable_sftp == 'no'
        run: |
          CXX="${{ env.CXX }}"
          $CXX -static -s -O3 -pthread -DNOJIT \
            zpaqfranz.cpp -o zpaqfranz \
            -lm -ldl \
            ${{ github.event.inputs.extra_cxxflags }}

      # ========== 复制运行时库 (仅 SFTP=yes) ==========
      - name: 复制 libcurl.so 并 strip
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          PREFIX="${{ steps.env.outputs.PREFIX }}"
          cp "${PREFIX}/lib/libcurl.so.4" .
          ${{ env.STRIP }} zpaqfranz libcurl.so.4 2>/dev/null || true

      # ========== 收集产物 ==========
      - name: 收集产物
        run: |
          TARGET="${{ matrix.t }}"
          mkdir -p dist
          cp zpaqfranz dist/
          if [[ "${{ github.event.inputs.enable_sftp }}" == "yes" ]]; then
            cp libcurl.so.4 dist/
          fi
          echo "产物列表:"
          ls -lh dist/

      - name: 验证动态库依赖
        if: github.event.inputs.enable_sftp == 'yes'
        run: |
          echo "zpaqfranz 动态依赖:"
          ${{ github.workspace }}/toolchain/bin/${{ steps.env.outputs.TC }}-readelf -d zpaqfranz | grep NEEDED || true
          echo "libcurl.so.4 动态依赖:"
          ${{ github.workspace }}/toolchain/bin/${{ steps.env.outputs.TC }}-readelf -d libcurl.so.4 | grep NEEDED || true

      - name: 生成摘要
        env:
          IS_FIRST: ${{ matrix.t == needs.prepare.outputs.first_key }}
        run: |
          TARGET="${{ matrix.t }}"
          {
            echo "## \`${TARGET}\`"
            echo ""
            echo "### 二进制文件"
            echo "| 文件 | 大小 | SHA256 |"
            echo "|---|---|---|"
            for f in dist/*; do
              fname=$(basename "$f")
              B_SIZE=$(ls -lh "$f" | awk '{print $5}')
              B_S256=$(sha256sum "$f" | awk '{print $1}')
              echo "| \`${fname}\` | ${B_SIZE} | \`${B_S256}\` |"
            done
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_FIRST" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🧪 测试运行 (${TARGET})" >> $GITHUB_STEP_SUMMARY
            chmod +x dist/zpaqfranz
            HELP=$(./dist/zpaqfranz --help 2>&1 | head -20 || true)
            {
              echo "<details><summary><code>zpaqfranz --help</code> (前20行)</summary>"
              echo '```'
              echo "$HELP"
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: 打包产物（二进制）
        run: |
          TARGET="${{ matrix.t }}"
          tar -cJf "${TARGET}.tar.xz" -C dist .
          echo "打包: ${TARGET}.tar.xz ($(ls -lh "${TARGET}.tar.xz" | awk '{print $5}'))"

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.t }}
          path: ${{ matrix.t }}.tar.xz

      - name: 上传静态库产物 (仅 SFTP=yes)
        if: github.event.inputs.enable_sftp == 'yes'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.t }}-static-libs
          path: ${{ matrix.t }}-static-libs.tar.xz
