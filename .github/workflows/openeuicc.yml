name: Build OpenEUICC Privileged Release

on:
  workflow_dispatch:
  schedule:
    - cron: '40 9 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone upstream OpenEUICC
        run: |
          git clone --recurse-submodules https://gitea.angry.im/PeterCxy/OpenEUICC.git
          cd OpenEUICC
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "commit_full=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Check if new commit
        id: check
        run: |
          if [ -f last_commit.txt ] && [ "$(cat last_commit.txt)" = "${{ env.commit_full }}" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 17
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        if: steps.check.outputs.changed == 'true'
        uses: android-actions/setup-android@v3

      - name: Restore signing keystore
        if: steps.check.outputs.changed == 'true'
        working-directory: OpenEUICC
        run: |
          echo "${{ secrets.KEYSTORE_JKS_B64 }}" | base64 -d > openeuicc.jks
          file openeuicc.jks
          keytool -list -keystore openeuicc.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" || (echo "KEYSTORE损坏或密码错误!"; exit 1)

          ABS_PATH="$(pwd)/openeuicc.jks"
          echo "${{ secrets.KEYSTORE_PROPS_B64 }}" | base64 -d > keystore.properties.tmp
          grep -v '^storeFile=' keystore.properties.tmp > keystore.properties
          echo "storeFile=$ABS_PATH" >> keystore.properties
          rm keystore.properties.tmp

      - name: Build privileged + unprivileged release
        if: steps.check.outputs.changed == 'true'
        working-directory: OpenEUICC
        run: ./gradlew --no-daemon :app:assembleReleaseMagiskModuleDir :app-unpriv:assembleRelease

      - name: Read version from module.prop
        if: steps.check.outputs.changed == 'true'
        id: ver
        working-directory: OpenEUICC
        run: |
          PROP="app/build/magisk/release/module.prop"
          VERSION=$(grep '^version=' "$PROP" | cut -d= -f2)
          VERSIONCODE=$(grep '^versionCode=' "$PROP" | cut -d= -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSIONCODE" >> $GITHUB_OUTPUT

      - name: Patch module.prop with updateJson
        if: steps.check.outputs.changed == 'true'
        working-directory: OpenEUICC
        run: |
          PROP="app/build/magisk/release/module.prop"
          grep -v '^updateJson=' "$PROP" > module.prop.tmp
          echo "updateJson=https://raw.githubusercontent.com/uxhzbaz/uxhzbaz.github.io/main/openeuicc.json" >> module.prop.tmp
          mv module.prop.tmp "$PROP"

      - name: Repack Magisk module with max compression
        if: steps.check.outputs.changed == 'true'
        working-directory: OpenEUICC/app/build/magisk/release
        run: |
          zip -r -9 -X "../../../../../OpenEUICC-Magisk_module-v${{ steps.ver.outputs.version }}-priv(${{ steps.ver.outputs.versionCode }}).zip" .

      - name: Locate and rename unpriv APK
        if: steps.check.outputs.changed == 'true'
        working-directory: OpenEUICC
        run: |
          apk_path=$(find app-unpriv/build/outputs/apk/release -name "*.apk" | head -n1)
          cp "$apk_path" "../EasyEUICC-v${{ steps.ver.outputs.version }}-unpriv(${{ steps.ver.outputs.versionCode }}).apk"

      - name: Compute SHA256
        if: steps.check.outputs.changed == 'true'
        id: sha
        run: |
          ZIP_NAME="OpenEUICC-Magisk_module-v${{ steps.ver.outputs.version }}-priv(${{ steps.ver.outputs.versionCode }}).zip"
          APK_NAME="EasyEUICC-v${{ steps.ver.outputs.version }}-unpriv(${{ steps.ver.outputs.versionCode }}).apk"
          ZIP_SHA=$(sha256sum "$ZIP_NAME" | awk '{print $1}')
          APK_SHA=$(sha256sum "$APK_NAME" | awk '{print $1}')
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "zip_sha=$ZIP_SHA" >> $GITHUB_OUTPUT
          echo "apk_sha=$APK_SHA" >> $GITHUB_OUTPUT

      - name: Update openeuicc.json in repo
        if: steps.check.outputs.changed == 'true'
        run: |
          cat > openeuicc.json << EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "versionCode": ${{ steps.ver.outputs.versionCode }},
            "zipUrl": "https://github.com/uxhzbaz/uxhzbaz.github.io/releases/download/v${{ steps.ver.outputs.version }}/${{ steps.sha.outputs.zip_name }}",
            "changelog": "https://github.com/uxhzbaz/uxhzbaz.github.io/releases/tag/v${{ steps.ver.outputs.version }}"
          }
          EOF

      - name: Create Release
        if: steps.check.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ steps.sha.outputs.zip_name }},${{ steps.sha.outputs.apk_name }}"
          name: "OpenEUICC ${{ steps.ver.outputs.version }}"
          tag: "v${{ steps.ver.outputs.version }}"
          body: |
            基于上游commit ${{ env.commit_full }}

            **SHA256校验值**

            `${{ steps.sha.outputs.zip_name }}`
            `${{ steps.sha.outputs.zip_sha }}`

            `${{ steps.sha.outputs.apk_name }}`
            `${{ steps.sha.outputs.apk_sha }}`
          token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Commit openeuicc.json and last_commit.txt
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "${{ env.commit_full }}" > last_commit.txt
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add openeuicc.json last_commit.txt
          git commit -m "Update to ${{ steps.ver.outputs.version }}"
          git push
