name: Build xz (musl.cc toolchain, static)
on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'XZ source tarball URL (.tar.gz or .tar.xz)'
        default: 'https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.xz'
      targets:
        description: 'Comma-separated target triples'
        default: 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - id: parse
        shell: bash
        run: |
          include='[]'
          IFS=',' read -ra TARGETS <<< '${{ inputs.targets }}'
          for t in "${TARGETS[@]}"; do
            t="${t# }"; t="${t% }"
            case "$t" in
              x86_64-linux-musl)   url="https://musl.cc/x86_64-linux-musl-cross.tgz"   ;;
              aarch64-linux-musl)  url="https://musl.cc/aarch64-linux-musl-cross.tgz"  ;;
              i686-linux-musl)     url="https://musl.cc/i686-linux-musl-cross.tgz"     ;;
              arm-linux-musleabi)  url="https://musl.cc/arm-linux-musleabi-cross.tgz"  ;;
              *) echo "::warning::未知目标 $t，跳过"; continue ;;
            esac
            include=$(jq --arg t "$t" --arg url "$url" \
              '. += [{"t":$t,"url":$url}]' <<< "$include")
          done
          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: 缓存 musl.cc 工具链
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain
          key: musl-toolchain-${{ matrix.t }}-v1

      - name: 下载工具链
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "${{ matrix.url }}" -o toolchain.tgz
          mkdir -p "${{ github.workspace }}/toolchain"
          tar -xf toolchain.tgz -C "${{ github.workspace }}/toolchain" --strip-components=1

      - name: 下载并解压 XZ 源码
        run: |
          URL="${{ inputs.source_url }}"
          curl -fsSL "$URL" -o src.tar.${URL##*.}
          mkdir -p src
          tar -xf src.tar.${URL##*.} -C src --strip-components=1

      - name: 编译
        run: |
          export PATH="${{ github.workspace }}/toolchain/bin:$PATH"
          export CC="${{ matrix.t }}-gcc"
          export AR="${{ matrix.t }}-ar"
          export RANLIB="${{ matrix.t }}-ranlib"
          export STRIP="${{ matrix.t }}-strip"
          export CFLAGS="-static -Os"
          export LDFLAGS="-static"
          cd src
          ./configure \
            --host="${{ matrix.t }}" \
            --disable-shared \
            --enable-static \
            --disable-nls \
            --disable-threads \
            --disable-sandbox \
            --disable-xzdec \
            --disable-lzmadec \
            --disable-lzmainfo \
            --disable-lzma-links \
            --disable-scripts \
            --disable-doc
          make -j$(nproc)
          "${STRIP}" src/xz/xz

      - name: 验证静态链接
        run: |
          file src/src/xz/xz
          file src/src/xz/xz | grep -q "statically linked" || \
            { echo "::error::二进制未静态链接"; exit 1; }

      - name: 打包并生成摘要
        run: |
          TARGET="${{ matrix.t }}"
          BIN="src/src/xz/xz"
          B_SIZE=$(ls -lh "$BIN" | awk '{print $5}')
          B_S256=$(sha256sum "$BIN" | awk '{print $1}')
          B_S512=$(sha512sum "$BIN" | awk '{print $1}')
          cp "$BIN" "xz-${TARGET}"
          {
            echo "## \`xz-${TARGET}\`"
            echo ""
            echo "### 🔧 二进制可执行文件校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            echo "| \`xz\` | ${B_SIZE} | \`${B_S256}\` | \`${B_S512}\` |"
            echo ""
            echo "### 💡 工具帮助信息"
            echo "<details><summary><code>xz --help</code></summary>"
            echo ""
            echo '```'
            src/src/xz/xz --help 2>&1 || true
            echo '```'
            echo "</details>"
          } >> $GITHUB_STEP_SUMMARY

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: xz-${{ matrix.t }}
          path: xz-${{ matrix.t }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: dist/**/xz-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}