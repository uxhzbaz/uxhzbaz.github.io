name: B (XZ Utils static)
run-name: ${{ github.event.inputs.run_name || github.actor }}
on:
  workflow_dispatch:
    inputs:
      run_name:
        description: '工作流运行名称'
        default: ''
        required: false
      source_url:
        description: '源码包URL (.tar.gz / .tar.xz)'
        default: 'https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.xz'
      targets:
        description: '目标三元组，逗号分隔'
        default: 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi'
      configure_args:
        description: '额外的 ./configure 参数'
        default: '--disable-shared --enable-static --disable-nls'
        required: false

env:
  TOOLCHAIN_TAG: '20260430'
  TOOLCHAIN_BASE: 'https://github.com/cross-tools/musl-cross/releases/download/20260430'

jobs:
  s:
    name: 解析参数
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.p.outputs.matrix }}
      first_key: ${{ steps.p.outputs.first_key }}
    steps:
      - id: p
        shell: bash
        env:
          TARGETS: ${{ github.event.inputs.targets }}
          TOOLCHAIN_BASE: 'https://github.com/cross-tools/musl-cross/releases/download/20260430'
        run: |
          include='[]'
          first_key=''
          IFS=',' read -ra TS <<< "$TARGETS"
          for t in "${TS[@]}"; do
            t="${t# }"; t="${t% }"
            case "$t" in
              x86_64-linux-musl)            tc_triple="x86_64-unknown-linux-musl"    ;;
              aarch64-linux-musl)           tc_triple="aarch64-unknown-linux-musl"   ;;
              i686-linux-musl)              tc_triple="i686-unknown-linux-musl"      ;;
              arm-linux-musleabi)           tc_triple="arm-unknown-linux-musleabi"   ;;
              armv7-linux-musleabi)         tc_triple="armv7-unknown-linux-musleabi" ;;
              x86_64-unknown-linux-musl)    tc_triple="x86_64-unknown-linux-musl"   ;;
              aarch64-unknown-linux-musl)   tc_triple="aarch64-unknown-linux-musl"  ;;
              i686-unknown-linux-musl)      tc_triple="i686-unknown-linux-musl"     ;;
              arm-unknown-linux-musleabi)   tc_triple="arm-unknown-linux-musleabi"  ;;
              armv7-unknown-linux-musleabi) tc_triple="armv7-unknown-linux-musleabi" ;;
              *)
                echo "::warning::未知目标 $t，跳过"
                continue
                ;;
            esac
            tc_url="${TOOLCHAIN_BASE}/${tc_triple}.tar.xz"
            include=$(jq \
              --arg t "$t" --arg tc_triple "$tc_triple" --arg tc_url "$tc_url" \
              '. += [{"t":$t,"tc_triple":$tc_triple,"tc_url":$tc_url}]' \
              <<< "$include")
            [[ -z "$first_key" ]] && first_key="$t"
          done
          echo "matrix=$(jq -c '{"include":.}' <<< "$include")" >> $GITHUB_OUTPUT
          echo "first_key=$first_key" >> $GITHUB_OUTPUT

  build:
    needs: s
    name: ${{ matrix.t }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.s.outputs.matrix) }}
    steps:
      - name: 缓存工具链
        id: cache-tc
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/toolchain
          key: musl-toolchain-${{ matrix.tc_triple }}-${{ env.TOOLCHAIN_TAG }}

      - name: 下载并解压工具链
        if: steps.cache-tc.outputs.cache-hit != 'true'
        run: |
          curl -fsSL --retry 3 --retry-delay 5 "${{ matrix.tc_url }}" -o toolchain.tar.xz
          mkdir -p "${{ github.workspace }}/toolchain"
          tar -xf toolchain.tar.xz -C "${{ github.workspace }}/toolchain" --strip-components=1

      - name: 下载并解压源码
        run: |
          URL="${{ github.event.inputs.source_url }}"
          EXT="${URL##*.}"
          curl -fsSL --retry 3 --retry-delay 5 "$URL" -o "src.tar.${EXT}"
          mkdir -p src
          tar -xf "src.tar.${EXT}" -C src --strip-components=1

      - name: 编译并安装
        run: |
          TC="${{ matrix.tc_triple }}"
          INST="${{ github.workspace }}/install"
          export PATH="${{ github.workspace }}/toolchain/bin:$PATH"
          export CC="${TC}-gcc"
          export CXX="${TC}-g++"
          export AR="${TC}-ar"
          export RANLIB="${TC}-ranlib"
          export STRIP="${TC}-strip"
          export CFLAGS="-Os"
          export PKG_CONFIG="false"
          cd src
          LDFLAGS="-static" ./configure \
            --host="${TC}" \
            --prefix=/usr \
            --disable-dependency-tracking \
            ${{ github.event.inputs.configure_args }}
          make -j$(nproc) LDFLAGS="-all-static"
          make install DESTDIR="$INST"

      - name: 收集产物
        run: |
          TARGET="${{ matrix.t }}"
          TC="${{ matrix.tc_triple }}"
          INST="${{ github.workspace }}/install"
          STRIP_BIN="${{ github.workspace }}/toolchain/bin/${TC}-strip"
          mkdir -p dist

          # ELF 可执行二进制 -> 只用工具本身名字
          while IFS= read -r -d '' f; do
            file "$f" | grep -qE 'ELF.*(executable)' || continue
            fname=$(basename "$f")
            "$STRIP_BIN" "$f" 2>/dev/null || true
            cp "$f" "dist/${fname}"
          done < <(find "${INST}/usr/bin" -maxdepth 1 -type f -print0 2>/dev/null)

          # shell 脚本（xzgrep、xzdiff 等）
          while IFS= read -r -d '' f; do
            file "$f" | grep -qiE 'shell script|text' || continue
            fname=$(basename "$f")
            cp "$f" "dist/${fname}"
          done < <(find "${INST}/usr/bin" -maxdepth 1 -type f -print0 2>/dev/null)

          # .mo 本地化文件，保留相对路径 locale/xx/LC_MESSAGES/xz.mo
          find "${INST}" -name '*.mo' | while read -r f; do
            rel="${f#${INST}/}"
            mkdir -p "dist/$(dirname "$rel")"
            cp "$f" "dist/${rel}"
          done

          echo "产物列表:"
          find dist -type f | sort

      - name: 验证静态链接
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            file "$f" | grep -qE 'ELF.*executable' || continue
            if ! file "$f" | grep -q "statically linked"; then
              echo "::error::$f 未静态链接: $(file "$f")"
              fail=1
            else
              echo "OK: $(basename "$f") - statically linked"
            fi
          done < <(find dist -maxdepth 1 -type f -print0)
          [[ $fail -eq 0 ]] || exit 1

      - name: 生成摘要
        env:
          IS_FIRST: ${{ matrix.t == needs.s.outputs.first_key }}
        run: |
          TARGET="${{ matrix.t }}"
          {
            echo "## \`${TARGET}\`"
            echo ""
            echo "### 🔧 二进制可执行文件校验"
            echo "| 文件 | 大小 | SHA256 | SHA512 |"
            echo "|---|---|---|---|"
            while IFS= read -r -d '' f; do
              file "$f" | grep -qE 'ELF.*executable' || continue
              fname=$(basename "$f")
              B_SIZE=$(ls -lh "$f" | awk '{print $5}')
              B_S256=$(sha256sum "$f" | awk '{print $1}')
              B_S512=$(sha512sum "$f" | awk '{print $1}')
              echo "| \`${fname}\` | ${B_SIZE} | \`${B_S256}\` | \`${B_S512}\` |"
            done < <(find dist -maxdepth 1 -type f -print0 | sort -z)
          } >> $GITHUB_STEP_SUMMARY

          if [[ "$IS_FIRST" == "true" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 💡 工具帮助信息" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r -d '' f; do
              file "$f" | grep -qE 'ELF.*executable' || continue
              fname=$(basename "$f")
              HELP=$("$f" --help 2>&1 || true)
              {
                echo "<details><summary><code>${fname} --help</code></summary>"
                echo ""
                echo '```'
                echo "$HELP"
                echo '```'
                echo "</details>"
              } >> $GITHUB_STEP_SUMMARY
            done < <(find dist -maxdepth 1 -type f -print0 | sort -z)
          fi

      - name: 打包产物
        run: |
          TARGET="${{ matrix.t }}"
          tar -cJf "${TARGET}.tar.xz" -C dist .
          echo "打包完成: ${TARGET}.tar.xz ($(ls -lh "${TARGET}.tar.xz" | awk '{print $5}'))"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.t }}
          path: ${{ matrix.t }}.tar.xz