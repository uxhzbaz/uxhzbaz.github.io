name: Build xz

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'XZ source tarball URL (.tar.gz or .tar.xz)'
        default: 'https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.xz'
      targets:
        description: 'Comma-separated target triples'
        default: 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.parse.outputs.targets }}
    steps:
      - id: parse
        shell: bash
        run: |
          T='${{ inputs.targets }}'
          json='['
          IFS=','; for t in $T; do
            t=${t# }; t=${t% }
            case "$t" in
              x86_64-linux-musl)        platform="linux/amd64";   image="amd64/alpine:edge" ;;
              aarch64-linux-musl)       platform="linux/arm64";   image="arm64v8/alpine:edge" ;;
              i686-linux-musl)          platform="linux/386";     image="i386/alpine:edge" ;;
              arm-linux-musleabi)       platform="linux/arm/v7";  image="arm32v7/alpine:edge" ;;
              *)                        platform=""; image="" ;;
            esac
            json+="{\"t\":\"$t\",\"platform\":\"$platform\",\"image\":\"$image\"},"
          done
          json="${json%,}]"
          echo "targets=$json" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build in Alpine container
        env:
          PLATFORM: ${{ matrix.target.platform }}
          IMAGE: ${{ matrix.target.image }}
          TARGET: ${{ matrix.target.t }}
          SOURCE_URL: ${{ inputs.source_url }}
        run: |
          docker run --rm --platform "${PLATFORM}" \
            -e TARGET="${TARGET}" \
            -v "$PWD":/work -w /work \
            "${IMAGE}" sh -c "
              set -e
              apk add --no-cache curl tar xz build-base

              # download and extract source
              URL='${SOURCE_URL}'
              EXT=\"\${URL##*.}\"
              curl -sL \"\$URL\" -o /tmp/src.tar.\${EXT}
              case \"\${EXT}\" in
                gz) tar -xzf /tmp/src.tar.\${EXT} ;;
                xz) tar -xJf /tmp/src.tar.\${EXT} ;;
                *)  tar -xf /tmp/src.tar.\${EXT} ;;
              esac
              cd xz-*

              # configure & compile (static musl, matching Alpine APKBUILD)
              CFLAGS='-O2' \
              ./configure \
                --disable-nls \
                --disable-shared \
                --enable-static \
                --disable-threads \
                --disable-sandbox \
                --disable-xzdec \
                --disable-lzmadec \
                --disable-lzmainfo \
                --disable-lzma-links \
                --disable-rpath \
                --disable-werror \
                --disable-doc

              make -j\$(nproc)
              strip src/xz/xz

              # package
              STAGE=\"xz-\${TARGET}\"
              mkdir -p /work/\"\${STAGE}\"
              cp src/xz/xz /work/\"\${STAGE}\"/
              cd /work
              tar -cJf \"\${STAGE}.tar.xz\" \"\${STAGE}\"
              sha256sum \"\${STAGE}.tar.xz\" > \"\${STAGE}.tar.xz.SHA256\"
              echo \"Built \${STAGE}.tar.xz\"
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz-${{ matrix.target.t }}
          path: |
            xz-${{ matrix.target.t }}.tar.xz
            xz-${{ matrix.target.t }}.tar.xz.SHA256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/xz-*.tar.xz
            dist/**/xz-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}