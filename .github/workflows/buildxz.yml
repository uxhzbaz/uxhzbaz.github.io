name: Build xz

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'XZ source tarball URL (.tar.gz or .tar.xz)'
        default: 'https://raw.githubusercontent.com/uxhzbaz/uxhzbaz.github.io/refs/heads/main/xz-5.8.3-zh_CN.tar.xz'
      targets:
        description: 'Comma-separated target triples'
        default: 'x86_64-linux-musl,aarch64-linux-musl,i686-linux-musl,arm-linux-musleabi'
      zig_version:
        description: 'Zig version (used for non-x86_64 musl targets)'
        default: '0.15.1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.parse.outputs.targets }}
    steps:
      - id: parse
        shell: bash
        run: |
          T='${{ inputs.targets }}'
          json='['
          IFS=','; for t in $T; do
            t=${t# }; t=${t% }
            json+="\"$t\","
          done
          json="${json%,}]"
          echo "targets=$json" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.prepare.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y xz-utils curl tar musl-tools

      - name: Install Zig (for non-x86_64 targets)
        if: matrix.target != 'x86_64-linux-musl'
        run: |
          ZV="${{ inputs.zig_version }}"
          ZP="zig-$(uname -m)-linux-${ZV}.tar.xz"
          curl -fsSL "https://ziglang.org/download/${ZV}/${ZP}" -o /tmp/z.tar.xz
          mkdir -p ~/zig && tar -C ~/zig -xJf /tmp/z.tar.xz
          ZD=$(tar -tf /tmp/z.tar.xz | head -1 | cut -d/ -f1)
          echo "$HOME/zig/${ZD}" >> $GITHUB_PATH

      - name: Build xz
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -e
          # Download & extract source
          URL="${{ inputs.source_url }}"
          EXT="${URL##*.}"
          curl -sL "$URL" -o /tmp/src.tar.${EXT}
          case "${EXT}" in
            gz)  tar -xzf /tmp/src.tar.${EXT} --strip-components=1 ;;
            xz)  tar -xJf /tmp/src.tar.${EXT} --strip-components=1 ;;
            *)   tar -xf /tmp/src.tar.${EXT} --strip-components=1 ;;
          esac

          BUILD=$(gcc -dumpmachine)   # e.g. x86_64-linux-gnu
          HOST="${TARGET}"

          # --- Set up compiler -------------------------------------------------
          if [ "${TARGET}" = "x86_64-linux-musl" ]; then
            # Use musl-gcc available from musl-tools
            export CC=musl-gcc
            export CFLAGS="-O2 -fno-pie"
            export LDFLAGS="-static -no-pie"
          else
            # Use Zig for cross compilation
            export CC="zig cc -target ${TARGET}"
            export CFLAGS="-O2 -static"
            export LDFLAGS="-static"
          fi

          # --- Configure & make ------------------------------------------------
          ./configure \
            --build="${BUILD}" \
            --host="${HOST}" \
            --disable-nls \
            --disable-shared \
            --enable-static \
            --disable-threads \
            --disable-sandbox \
            --disable-xzdec \
            --disable-lzmadec \
            --disable-lzmainfo \
            --disable-lzma-links

          make -j$(nproc)
          strip src/xz/xz

          # --- Package ---------------------------------------------------------
          STAGE="xz-${TARGET}"
          mkdir -p "${STAGE}"
          cp src/xz/xz "${STAGE}/"
          tar -cJf "${STAGE}.tar.xz" "${STAGE}"
          sha256sum "${STAGE}.tar.xz" | tee "${STAGE}.tar.xz.SHA256"
          echo "Built: ${STAGE}.tar.xz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xz-${{ matrix.target }}
          path: |
            xz-${{ matrix.target }}.tar.xz
            xz-${{ matrix.target }}.tar.xz.SHA256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/xz-*.tar.xz
            dist/**/xz-*.tar.xz.SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}