name: Build LifeRestart (Enhanced)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        run: |
          curl -L -o src.tar.gz \
            https://github.com/VickScarlet/lifeRestart/archive/refs/tags/v2.1.0.tar.gz
          mkdir src && tar -xf src.tar.gz -C src --strip-components=1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Apply gameplay patches
        run: |
          python3 - <<'PY'
          def patch(path, old, new, desc):
              s = open(path, encoding="utf-8").read()
              assert old in s, f"pattern not found for [{desc}] in {path}"
              open(path, "w", encoding="utf-8").write(s.replace(old, new, 1))

          # 1. 天赋抽卡数量 10 -> 100
          patch("src/src/index.js",
                "talentPullCount: 10, // number of talents to pull from the talent pool",
                "talentPullCount: 100, // number of talents to pull from the talent pool",
                "talentPullCount")

          # 2. 提高好词条(2/3档)出现概率
          patch("src/src/index.js",
                "talentRate: { 1:100, 2:10, 3:1, total: 1000 }, // rate of talent pull",
                "talentRate: { 1:1, 2:30, 3:100, total: 1000 }, // rate of talent pull（提高优质词条概率）",
                "talentRate")

          # 3. 天赋选择数量不限制
          patch("src/src/index.js",
                "talentSelectLimit: 3, // max number of talents that can be selected",
                "talentSelectLimit: Infinity, // max number of talents that can be selected（不限制数量）",
                "talentSelectLimit")

          # 4. 体质低时不会意外死亡（拦截死亡事件本身，而不是猜阈值）
          patch("src/src/modules/life.js",
                "        this.#property.change(this.PropertyTypes.EVT, eventId);\n        this.#property.effect(effect);\n",
                "        this.#property.change(this.PropertyTypes.EVT, eventId);\n        if(eventId !== 10000) this.#property.effect(effect); // 体质低时不会意外死亡，更折磨\n",
                "doEvent skip death effect")

          # 5. 天赋列表按品质从高到低排序 + 取消次数限制的按钮逻辑（default / cyber 两套主题）
          for f in ["src/src/ui/themes/default/talent.js", "src/src/ui/themes/cyber/talent.js"]:
              patch(f,
                    "this.listTalents.array = core.talentRandom();",
                    "this.listTalents.array = core.talentRandom().sort((a, b) => b.grade - a.grade);",
                    f"sort talents in {f}")

              patch(f,
                    "        if(this.#selected.size < core.talentSelectLimit) {\n"
                    "            return $$event('message', ['F_TalentSelectNotComplect', core.talentSelectLimit]);\n"
                    "        }\n\n",
                    "",
                    f"remove select-count gate in {f}")

              patch(f,
                    "this.btnNext.label = 'UI_Talent_Select_Uncomplete';",
                    "this.btnNext.label = 'UI_Next';",
                    f"init label in {f}")

          patch("src/src/ui/themes/default/talent.js",
                "            this.btnNext.label = this.#selected.size === core.talentSelectLimit\n"
                "                ? 'UI_Next'\n"
                "                : 'UI_Talent_Select_Uncomplete';\n\n"
                "            changeStyle();",
                "            changeStyle();",
                "default per-click label")

          patch("src/src/ui/themes/cyber/talent.js",
                "            this.btnNext.label = this.#selected.size === core.talentSelectLimit\n"
                "                ? 'UI_Next'\n"
                "                : 'UI_Talent_Select_Uncomplete';\n"
                "            unselected.visible = !( selected.visible = this.#selected.has(index) );",
                "            unselected.visible = !( selected.visible = this.#selected.has(index) );",
                "cyber per-click label")

          print("all patches applied")
          PY

      - name: Install deps
        working-directory: src
        run: npm install

      - name: Generate JSON from xlsx data
        working-directory: src
        run: npm run xlsx2json

      - name: Build
        working-directory: src
        run: npm run build   # outputs to src/template/public

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: lifeRestart-enhanced
          path: src/template/public
