name: Cross-Compile Chafa for Android API 24
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  API: 24
  TRIPLE: aarch64-linux-android
  VER: 1.18.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup NDK & Env
        run: |
          sudo apt-get install -y meson ninja-build
          N=$(ls /usr/local/lib/android/sdk/ndk/ | sort -V | tail -1)
          TC="/usr/local/lib/android/sdk/ndk/$N/toolchains/llvm/prebuilt/linux-x86_64"
          P="$GITHUB_WORKSPACE/prefix"
          mkdir -p "$P"
          cat >> $GITHUB_ENV << EOF
          TC=$TC
          P=$P
          CC=$TC/bin/${TRIPLE}${API}-clang
          CXX=$TC/bin/${TRIPLE}${API}-clang++
          AR=$TC/bin/llvm-ar
          RANLIB=$TC/bin/llvm-ranlib
          STRIP=$TC/bin/llvm-strip
          PKG_CONFIG_PATH=$P/lib/pkgconfig
          PKG_CONFIG_LIBDIR=$P/lib/pkgconfig
          EOF

      - name: Build pcre2
        run: |
          curl -fsSL https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.45/pcre2-10.45.tar.gz | tar xz
          cd pcre2-10.45
          ./configure --host=$TRIPLE --prefix=$P --disable-shared \
            CFLAGS="--sysroot=$TC/sysroot" LDFLAGS="--sysroot=$TC/sysroot"
          make -j$(nproc) && make install

      - name: Build libffi
        run: |
          curl -fsSL https://github.com/libffi/libffi/releases/download/v3.4.8/libffi-3.4.8.tar.gz | tar xz
          cd libffi-3.4.8
          ./configure --host=$TRIPLE --prefix=$P --disable-shared \
            CFLAGS="--sysroot=$TC/sysroot" LDFLAGS="--sysroot=$TC/sysroot"
          make -j$(nproc) && make install
      - name: Build libiconv
        run: |
          curl -fsSL https://ftp.gnu.org/pub/gnu/libiconv/libiconv-1.17.tar.gz | tar xz
          cd libiconv-1.17
          ./configure --host=$TRIPLE --prefix=$P --disable-shared \
            CFLAGS="--sysroot=$TC/sysroot" LDFLAGS="--sysroot=$TC/sysroot"
          make -j$(nproc) && make install
          cat > $P/lib/pkgconfig/iconv.pc << EOF
          prefix=$P
          libdir=\${prefix}/lib
          includedir=\${prefix}/include
          Name: iconv
          Version: 1.17
          Description: iconv
          Libs: -L\${libdir} -liconv
          Cflags: -I\${includedir}
          EOF
          cp $P/lib/libiconv.a $TC/sysroot/usr/lib/aarch64-linux-android/
          cp $P/include/iconv.h $TC/sysroot/usr/include/
      - name: Build glib2
        run: |
          curl -fsSL https://download.gnome.org/sources/glib/2.78/glib-2.78.6.tar.xz | tar xJ
          cd glib-2.78.6
          cat > cross.ini << EOF
          [binaries]
          c = '$TC/bin/${TRIPLE}${API}-clang'
          cpp = '$TC/bin/${TRIPLE}${API}-clang++'
          ar = '$TC/bin/llvm-ar'
          ranlib = '$TC/bin/llvm-ranlib'
          strip = '$TC/bin/llvm-strip'
          pkg-config = 'pkg-config'
          [built-in options]
          c_args = ['--sysroot=$TC/sysroot', '-I$P/include']
          c_link_args = ['--sysroot=$TC/sysroot', '-L$P/lib']
          [properties]
          pkg_config_libdir = '$P/lib/pkgconfig'
          [host_machine]
          system = 'android'
          cpu_family = 'aarch64'
          cpu = 'aarch64'
          endian = 'little'
          EOF
          meson setup build --cross-file cross.ini \
            --prefix=$P --default-library=static \
            -Dtests=false -Dselinux=disabled \
            -Dlibmount=disabled -Dxattr=false
          ninja -C build && ninja -C build install

      - name: Build freetype2
        run: |
          curl -fsSL https://download.savannah.gnu.org/releases/freetype/freetype-2.13.3.tar.xz | tar xJ
          cd freetype-2.13.3
          ./configure --host=$TRIPLE --prefix=$P --disable-shared --enable-static \
            --without-harfbuzz --without-png --without-bzip2 \
            CFLAGS="--sysroot=$TC/sysroot" LDFLAGS="--sysroot=$TC/sysroot"
          make -j$(nproc) && make install

      - name: Build Chafa
        run: |
          curl -fsSL https://github.com/hpjansson/chafa/releases/download/$VER/chafa-$VER.tar.xz | tar xJ
          cd chafa-$VER
          ./configure \
            --host=$TRIPLE \
            --prefix=$GITHUB_WORKSPACE/output \
            --disable-shared --enable-static \
            PKG_CONFIG_PATH=$P/lib/pkgconfig \
            CFLAGS="--sysroot=$TC/sysroot -I$P/include" \
            LDFLAGS="--sysroot=$TC/sysroot -L$P/lib"
          make -j$(nproc) && make install

      - uses: actions/upload-artifact@v4
        with:
          name: chafa-${{ env.VER }}-android${{ env.API }}-arm64
          path: output/
