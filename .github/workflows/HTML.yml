name: Build Single HTML

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - run: pnpm install
      
      - run: pnpm build
      
      - name: Generate Single HTML
        run: |
          cat > /tmp/inline.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const input = 'dist/index.html';
          const output = 'dist/FolkSplash.html';
          const dir = path.dirname(input);
          
          let html = fs.readFileSync(input, 'utf-8');
          
          html = html.replace(/<link[^>]*href="([^"]+)"[^>]*>/g, (m, h) => {
            const f = path.join(dir, h);
            return fs.existsSync(f) ? `<style>${fs.readFileSync(f, 'utf-8')}</style>` : m;
          });
          
          html = html.replace(/<script[^>]*src="([^"]+)"[^>]*><\/script>/g, (m, s) => {
            const f = path.join(dir, s);
            return fs.existsSync(f) ? `<script>${fs.readFileSync(f, 'utf-8')}</script>` : m;
          });
          
          html = html.replace(/(?:src|href)="([^"]+)"/g, (m, u) => {
            if (u.startsWith('http') || u.startsWith('data:') || u.startsWith('#')) return m;
            const f = path.join(dir, u);
            if (fs.existsSync(f)) {
              const ext = path.extname(u).toLowerCase();
              const types = {
                '.svg': 'image/svg+xml', '.png': 'image/png', '.jpg': 'image/jpeg',
                '.jpeg': 'image/jpeg', '.gif': 'image/gif', '.webp': 'image/webp',
                '.woff': 'font/woff', '.woff2': 'font/woff2', '.ttf': 'font/ttf',
              };
              const type = types[ext];
              if (type) {
                const b64 = fs.readFileSync(f).toString('base64');
                return `${m.split('=')[0]}="data:${type};base64,${b64}"`;
              }
            }
            return m;
          });
          
          fs.writeFileSync(output, html);
          const size = (fs.statSync(output).size / 1024 / 1024).toFixed(2);
          console.log(`✓ ${output} (${size} MB)`);
          EOF
          
          node /tmp/inline.js
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FolkSplash.html
          path: dist/FolkSplash.html
      
      - name: Upload to Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/FolkSplash.html
          tag_name: latest
          name: Latest Build
          prerelease: true
          body: "Auto-built from ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
